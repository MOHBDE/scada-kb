<style>
  :root{--bg:#080b10;--panel:#10151d;--panel2:#0c1118;--code:#0a0f16;--line:rgba(255,255,255,.07);--line-strong:rgba(255,255,255,.13);--line2:#161c26;--txt:#e6edf3;--txt2:#cbd5e1;--muted:#9aa7b5;--dim:#64717f;--accent:#f5a524;--accent-soft:rgba(245,165,36,.13);--ok:#34d399;--danger:#f87171;--mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'IBM Plex Sans',system-ui,sans-serif;--surface:linear-gradient(180deg,#11161f,#0d121a);--surface2:linear-gradient(180deg,#0c1118,#080b10);--glass:rgba(16,21,29,.66);--glow:rgba(245,165,36,.07);}

  .stationmap-panel{padding:0;overflow:hidden;}

  .stationset-input{flex:1;min-width:0;}

  .allstationsmap{height:300px;}
  .stationmap-panel .panel-h{display:flex;align-items:center;}
  .bk-section{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}
  .bk-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--txt);margin-bottom:8px;}
  .bk-head svg{width:17px;height:17px;color:var(--accent);}
  .bk-list{display:flex;flex-direction:column;gap:8px;}
  .bk-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--code);border:1px solid var(--line);border-radius:10px;flex-wrap:wrap;}
  .bk-info{flex:1;min-width:90px;display:flex;flex-direction:column;}
  .bk-date{font-size:13px;color:var(--txt);font-weight:600;font-family:var(--mono);}
  .bk-count{font-size:11px;color:var(--dim);font-family:var(--mono);}
  .modal-body{padding:20px;display:flex;flex-direction:column;gap:16px;}
  .x{background:none;border:none;color:var(--dim);cursor:pointer;transition:color .15s;}
  .x:hover{color:#fff;}
  label.field{display:block;}
  label.field .lbl{font-size:12px;color:var(--dim);margin-bottom:7px;display:block;letter-spacing:.01em;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .toggle-row{display:flex;gap:8px;flex-wrap:wrap;}
  .toggle{flex:1;padding:9px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;background:var(--code);border:1px solid var(--line);color:var(--dim);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
  .toggle.active{background:var(--accent-soft);border-color:rgba(245,165,36,.5);color:var(--accent);}
  textarea{resize:vertical;}
  .foot-btn{flex:1;padding:12px;border-radius:11px;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s;}
  .foot-btn:active{transform:scale(.98);}
  .foot-cancel{background:var(--line2);color:var(--txt2);}
  .foot-save{background:linear-gradient(180deg,#f7b73a,#f59e0b);color:#1a1206;font-weight:600;}
  .foot-save:disabled{opacity:.4;cursor:not-allowed;}
  .banner{margin:16px 0;padding:14px 16px;border-radius:12px;font-size:13px;line-height:1.5;}
  .banner.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:#fca5a5;}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:11px;font-size:13px;background:rgba(22,28,38,.95);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid rgba(52,211,153,.4);color:#6ee7b7;font-family:var(--mono);z-index:60;box-shadow:0 12px 30px -10px rgba(0,0,0,.6);animation:popIn .25s ease both;}
  .spin{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:none;}}
  @keyframes popIn{from{opacity:0;transform:translateY(10px) scale(.985);}to{opacity:1;transform:none;}}
  /* Login */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;}
  .login-card{position:relative;width:100%;max-width:392px;background:var(--surface);border:1px solid var(--line-strong);border-radius:22px;padding:36px 30px;box-shadow:0 40px 90px -40px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.02);overflow:hidden;animation:popIn .4s ease both;}
  .login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.8;}
  .login-card::after{content:"";position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:280px;height:280px;background:radial-gradient(circle,rgba(245,165,36,.12),transparent 65%);pointer-events:none;}
  .login-logo{position:relative;width:52px;height:52px;border-radius:14px;background:linear-gradient(140deg,#1b2330,#10151d);border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;color:var(--accent);margin-bottom:22px;box-shadow:0 12px 28px -10px rgba(245,165,36,.45);}
  .login-card h1{font-family:var(--mono);font-size:23px;margin:0 0 5px;font-weight:600;letter-spacing:-.01em;}
  .login-card p{color:var(--dim);font-size:13px;margin:0 0 26px;line-height:1.5;}
  .login-card label{display:block;margin-bottom:15px;}
  .login-card .lbl{font-size:12px;color:var(--muted);margin-bottom:7px;display:block;}
  /* System tabs */
  .systabs{display:flex;gap:7px;overflow-x:auto;margin:2px 0 14px;padding-bottom:2px;}
  .systabs::-webkit-scrollbar{display:none;}
  .systab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-family:var(--mono);font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .systab:hover{border-color:var(--line-strong);color:var(--txt2);}
  .systab.active{color:#fff;border-color:var(--sys,var(--accent));background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);box-shadow:0 0 0 1px var(--sys,var(--accent)),0 8px 22px -12px var(--sys,var(--accent));}
  .sysdot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor;}
  .syscnt{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(255,255,255,.06);color:var(--muted);}
  .systab.active .syscnt{background:rgba(255,255,255,.12);color:#fff;}
  /* Sub bar (count + sort) */
  .subbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:2px 0 14px;}
  .resultcnt{font-size:12px;color:var(--dim);font-family:var(--mono);}
  .sortwrap{display:flex;align-items:center;gap:6px;color:var(--dim);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 6px 0 10px;}
  .sortsel{width:auto;background:transparent;border:none;padding:7px 4px;font-size:12px;color:var(--muted);font-family:var(--mono);}
  .sortsel:focus{box-shadow:none;}
  /* System tag on card */
  .systag{font-size:9.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-family:var(--mono);padding:2px 7px;border-radius:6px;border:1px solid;background:rgba(255,255,255,.02);}
  /* Star button active */
  .ibtn.on{color:var(--accent);border-color:rgba(245,165,36,.4);background:var(--accent-soft);}
  .card.pinned{border-color:rgba(245,165,36,.28);}
  /* Tag buttons */
  .tag{background:none;border:none;padding:0;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--muted);opacity:.85;transition:color .15s;}
  .tag:hover{color:var(--accent);opacity:1;}
  /* User panel */
  .useryou{display:flex;align-items:center;gap:11px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--code);color:var(--accent);}
  .udivider{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);border-top:1px solid var(--line);padding-top:16px;margin-top:2px;}
  /* App shell */
  .app{display:flex;min-height:100vh;}
  .main{flex:1;min-width:0;max-width:1080px;margin:0 auto;padding:26px 26px 120px;width:100%;}
  .nav{position:fixed;top:0;left:0;bottom:0;width:248px;background:var(--glass);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:20px 14px;z-index:30;}
  .nav-brand{display:flex;align-items:center;gap:12px;padding:6px 8px 18px;}
  .nav-brandtxt .nav-title{font-family:var(--mono);font-size:17px;font-weight:600;}
  .nav-brandtxt .nav-sub{font-size:11px;color:var(--dim);}
  .nav-items{display:flex;flex-direction:column;gap:4px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;border:1px solid transparent;background:none;color:var(--muted);cursor:pointer;font-size:13.5px;font-family:var(--sans);text-align:left;transition:all .15s;}
  .nav-item:hover{background:var(--panel);color:var(--txt);}
  .nav-item.active{background:var(--accent-soft);color:#fff;border-color:rgba(245,165,36,.3);}
  .nav-ic{display:flex;color:var(--dim);}
  .nav-item.active .nav-ic,.nav-item:hover .nav-ic{color:inherit;}
  .nav-item.active .nav-ic{color:var(--accent);}
  .nav-lbl{flex:1;}
  .nav-lbl-s{display:none;}
  .nav-cnt{font-size:11px;color:var(--dim);background:rgba(255,255,255,.05);padding:1px 8px;border-radius:8px;font-family:var(--mono);}
  .nav-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);}
  .nav-user{display:flex;align-items:center;gap:10px;padding:6px 8px;color:var(--muted);font-size:12px;}
  .nav-email{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-footbtns{display:flex;gap:6px;margin-top:8px;}
  @media(min-width:861px){.main{margin-left:248px;}.fab{display:none;}}
  @media(max-width:860px){
    .nav{top:auto;width:100%;height:calc(64px + env(safe-area-inset-bottom));flex-direction:row;border-right:none;border-top:1px solid var(--line);padding:0 0 env(safe-area-inset-bottom);background:var(--glass);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);}
    .nav-brand,.nav-foot{display:none;}
    .nav-items{flex-direction:row;flex:1;gap:0;}
    .nav-item{flex:1;flex-direction:column;gap:3px;padding:8px 1px;border-radius:0;font-size:9.5px;justify-content:center;border:none;min-width:0;}

    .nav-lbl{display:none;}

    .nav-cnt{display:none;}
    .nav-ic svg{width:22px;height:22px;}
    .main{padding:16px 15px calc(92px + env(safe-area-inset-bottom));}

  }
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px;}
  .page-title{font-family:var(--mono);font-size:24px;font-weight:600;margin:0;letter-spacing:-.02em;}
  .page-sub{font-size:13px;color:var(--dim);margin:4px 0 0;}
  .addbtn{flex-shrink:0;}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  @media(max-width:640px){.tiles{grid-template-columns:repeat(2,1fr);}}
  .tile{position:relative;text-align:left;display:flex;flex-direction:column;gap:6px;padding:16px;border-radius:15px;border:1px solid var(--line);background:var(--surface);cursor:pointer;overflow:hidden;transition:transform .15s,border-color .15s;}
  .tile::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:var(--c);opacity:.6;}
  .tile:hover{transform:translateY(-2px);border-color:var(--line-strong);}
  .tile-ic{display:flex;}
  .tile-val{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1;}
  .tile-lbl{font-size:12px;color:var(--dim);}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:0;}
  @media(max-width:760px){.dash-grid{grid-template-columns:1fr;}}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:16px;margin-bottom:14px;}
  .panel-h{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .panel-h svg{color:var(--dim);}
  .bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer;}
  .bar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor;}
  .bar-label{width:64px;font-size:13px;color:var(--txt2);}
  .bar-track{flex:1;height:8px;border-radius:5px;background:rgba(255,255,255,.05);overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;transition:width .5s ease;}
  .bar-num{font-family:var(--mono);font-size:13px;color:var(--muted);width:28px;text-align:right;}
  .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .topic-card{display:flex;align-items:center;gap:9px;padding:11px;border-radius:11px;border:1px solid var(--line);background:var(--code);cursor:pointer;transition:all .15s;}
  .topic-card:hover{border-color:var(--cat);transform:translateY(-1px);}
  .topic-ic{display:flex;}
  .topic-name{flex:1;font-size:13px;color:var(--txt2);}
  .topic-cnt{font-family:var(--mono);font-size:12px;color:var(--dim);}
  .minirow{display:flex;align-items:center;gap:11px;width:100%;padding:9px 6px;border:none;border-bottom:1px solid var(--line);background:none;cursor:pointer;text-align:left;}

  .mini-ic{display:flex;flex-shrink:0;}
  .mini-title{flex:1;font-size:13px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mini-pin{display:flex;}

  .typechip.is-code{color:#a78bfa;border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.1);}
  .typechip.is-note{color:#60a5fa;border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.1);}
  .typechip svg{width:11px;height:11px;}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;}

  .topbar-actions{display:flex;gap:8px;flex-shrink:0;}
  @media(min-width:861px){.topbar-user{display:none;}}
  /* Code highlighting */
  pre.code .hljs,pre.code code.hljs{background:transparent;padding:0;color:#cbd5e1;}

  .code-copy:hover{color:var(--accent);}
  .code-copy svg{width:12px;height:12px;}

  button.card-title{background:none;border:none;padding:0;text-align:left;cursor:pointer;font-weight:600;font-size:14.5px;color:var(--txt);line-height:1.35;font-family:var(--sans);transition:color .15s;}

  .modal.detail{max-width:620px;}

  .related{border-top:1px solid var(--line);padding-top:14px;margin-top:6px;}
  .related-h{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}

  .welcome{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px;}

  .qbtn:hover{transform:translateY(-1px);border-color:var(--line-strong);}
  .qbtn svg{width:16px;height:16px;}

  .cloudtag:hover{color:var(--accent);border-color:rgba(245,165,36,.4);}
  .cloudcnt{font-size:10px;color:var(--dim);background:rgba(255,255,255,.05);padding:0 6px;border-radius:7px;}
  .nav-item.active{box-shadow:0 0 18px -10px var(--accent);}

  .splitfields{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  .lbl-opt{color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;}

  .card{box-shadow:0 2px 10px rgba(0,0,0,.16);}

  /* Signup link + approval list */
  .link-btn{display:block;width:100%;margin-top:14px;background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;font-family:var(--sans);}
  .link-btn:hover{text-decoration:underline;}
  .urow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .urow-mail{font-size:13px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px;}
  .urow-status{font-size:11px;font-family:var(--mono);margin-top:2px;}
  .urow-status.ok{color:var(--ok);}
  .urow-status.wait{color:var(--accent);}
  .utag.admin{font-size:9px;text-transform:uppercase;letter-spacing:.05em;padding:1px 6px;border-radius:6px;background:var(--accent-soft);color:var(--accent);font-family:var(--mono);}
  .ubtn-approve{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:#1a1205;border:none;border-radius:9px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);}
  .ubtn-approve svg{width:13px;height:13px;}
  .ubtn-revoke{flex-shrink:0;background:none;border:1px solid var(--line-strong);color:var(--muted);border-radius:9px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);}
  /* Images */
  .imgsection{margin-top:6px;}
  .imggrid{display:flex;flex-wrap:wrap;gap:8px;}
  .imgitem{position:relative;width:84px;height:84px;border-radius:10px;overflow:hidden;border:1px solid var(--line);}
  .imgitem img{width:100%;height:100%;object-fit:cover;display:block;}
  .imgdel{position:absolute;top:3px;right:3px;width:22px;height:22px;border:none;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .imgdel svg{width:13px;height:13px;}
  .imgadd{width:84px;height:84px;border-radius:10px;border:1px dashed var(--line-strong);background:var(--code);color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-size:11px;font-family:var(--sans);}
  .imgadd:hover{border-color:var(--accent);color:var(--accent);}
  .imgadd svg{width:18px;height:18px;}
  .imgadd:disabled{opacity:.6;cursor:default;}
  .imgstrip{display:flex;gap:8px;padding:10px 16px 0 18px;flex-wrap:wrap;}
  .imgthumb{position:relative;width:64px;height:64px;border-radius:9px;overflow:hidden;border:1px solid var(--line);display:block;}
  .imgthumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .imgmore{position:absolute;inset:0;background:rgba(0,0,0,.55);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;}
  .detail-imgs{display:flex;flex-direction:column;gap:10px;margin:6px 0;}
  .detail-imgs img{width:100%;border-radius:12px;border:1px solid var(--line);display:block;}
  /* Version history */
  .histbox{border-top:1px solid var(--line);padding-top:14px;margin-top:6px;}
  .hist-empty{color:var(--dim);font-size:13px;line-height:1.5;}
  .histrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .histrow:last-child{border-bottom:none;}
  .hist-when{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:12px;color:var(--txt2);}
  .hist-when svg{width:12px;height:12px;color:var(--dim);}
  .hist-snip{font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
  .hist-restore{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:9px;border:1px solid var(--line-strong);background:var(--code);color:var(--txt2);font-size:12px;font-family:var(--sans);cursor:pointer;}
  .hist-restore:hover{border-color:var(--accent);color:var(--accent);}
  .hist-restore:disabled{opacity:.5;cursor:default;}
  .foot-ghost{background:var(--code);border:1px solid var(--line-strong);color:var(--txt2);}
  .foot-ghost:hover{border-color:var(--accent);color:var(--accent);}
  /* Offline badge */
  .offline-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:9px;font-size:11px;font-family:var(--mono);background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.4);color:#fca5a5;}
  .offline-dot{width:7px;height:7px;border-radius:50%;background:#f87171;}
  /* Active tag filters */
  .activetags{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
  .activetags-lbl{font-size:12px;color:var(--dim);font-family:var(--mono);}
  .atag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:9px;border:1px solid rgba(245,165,36,.4);background:var(--accent-soft);color:var(--accent);font-family:var(--mono);font-size:12px;cursor:pointer;}
  .atag svg{width:12px;height:12px;}
  .atag-clear{padding:5px 10px;border-radius:9px;border:1px solid var(--line-strong);background:none;color:var(--muted);font-size:12px;cursor:pointer;}
  .atag-clear:hover{color:var(--accent);border-color:var(--accent);}
  /* Language selector */
  .langsel{background:var(--code);border:1px solid var(--line-strong);color:var(--txt2);border-radius:8px;padding:8px 10px;font-family:var(--sans);font-size:13px;text-transform:none;letter-spacing:0;min-width:120px;}
  /* Code line numbers */
  pre.code{display:flex;gap:12px;}
  pre.code .gutter{flex:none;text-align:right;color:#5a6673;user-select:none;white-space:pre;border-right:1px solid rgba(255,255,255,.07);padding-right:11px;}
  pre.code .codebody{flex:1 1 auto;min-width:0;white-space:pre;overflow-x:auto;display:block;}
  /* Density toggle */
  .density{display:flex;gap:2px;background:var(--code);border:1px solid var(--line);border-radius:9px;padding:2px;}
  .denbtn{display:flex;align-items:center;justify-content:center;width:30px;height:26px;border:none;background:none;color:var(--dim);border-radius:7px;cursor:pointer;}
  .denbtn svg{width:16px;height:16px;}
  .denbtn.active{background:var(--accent-soft);color:var(--accent);}
  /* Compact list */
  .compactlist{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--surface);}
  .compactrow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;}
  .compactrow:last-child{border-bottom:none;}
  .compactrow:hover{background:var(--accent-soft);}
  .cr-type{display:flex;flex-shrink:0;}
  .cr-type svg{width:16px;height:16px;}
  .cr-title{flex:1;min-width:0;font-size:13.5px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cr-ico{display:flex;flex-shrink:0;}
  .cr-ico svg{width:14px;height:14px;}
  .cr-sys{flex-shrink:0;font-family:var(--mono);font-size:10px;}
  .cr-badge{flex-shrink:0;font-size:9.5px;padding:2px 7px;border-radius:6px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;}
  .cr-date{flex-shrink:0;font-family:var(--mono);font-size:10.5px;color:var(--dim);}
  @media(max-width:620px){.cr-sys,.cr-date{display:none;}}
  /* Empty state */
  .empty-art{color:var(--dim);opacity:.85;margin-bottom:8px;}
  .empty-title{font-size:16px;font-weight:600;color:var(--txt);}
  .empty-sub{font-size:13px;color:var(--dim);margin:6px auto 0;max-width:360px;line-height:1.5;}
  /* Skeleton */
  @keyframes shimmer{0%{background-position:-450px 0;}100%{background-position:450px 0;}}
  .skel{background:linear-gradient(90deg,var(--line2) 25%,rgba(148,163,184,.18) 37%,var(--line2) 63%);background-size:900px 100%;animation:shimmer 1.4s infinite linear;border-radius:7px;}
  .skelcard{pointer-events:none;}
  /* Entrance animations */
  @keyframes cardin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .cards .card,.compactrow{animation:cardin .26s ease both;}
  @keyframes overlayin{from{opacity:0;}to{opacity:1;}}
  .overlay{animation:overlayin .18s ease;}
  @keyframes modalpop{from{opacity:0;transform:translateY(12px) scale(.985);}to{opacity:1;transform:none;}}
  .modal{animation:modalpop .24s cubic-bezier(.2,.7,.3,1) both;}
  @media (prefers-reduced-motion: reduce){.cards .card,.compactrow,.overlay,.modal,.skel{animation:none;}}
  /* Chat */
  .chat-people{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--line);}
  .person{display:inline-flex;align-items:center;gap:8px;flex-shrink:0;padding:7px 12px 7px 7px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--txt2);font-size:13px;cursor:pointer;font-family:var(--sans);white-space:nowrap;}
  .person.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .person-ic{display:flex;margin-left:5px;}
  .person-av{width:24px;height:24px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;}
  .chat-hint{color:var(--dim);font-size:13px;padding:8px;}
  .chat-msgs{display:flex;flex-direction:column;gap:8px;min-height:280px;max-height:56vh;overflow-y:auto;padding:6px 2px;}
  .chat-empty{margin:auto;text-align:center;color:var(--dim);font-size:13px;padding:20px;}
  .bubble-row{display:flex;}
  .bubble-row.me{justify-content:flex-end;}
  .bubble{max-width:80%;padding:9px 12px;border-radius:14px;background:var(--surface);border:1px solid var(--line);}
  .bubble.me{background:var(--accent-soft);border-color:rgba(245,165,36,.35);}
  .bubble-name{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:3px;}
  .bubble-body{font-size:14px;color:var(--txt);white-space:pre-wrap;word-break:break-word;line-height:1.45;}
  .bubble-time{font-size:10px;color:var(--dim);font-family:var(--mono);margin-top:4px;text-align:right;}
  .chat-input{display:flex;gap:8px;align-items:flex-end;margin-top:12px;border-top:1px solid var(--line);padding-top:12px;}
  .chat-input textarea{flex:1;resize:none;min-height:44px;max-height:120px;background:var(--code);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:11px 13px;font-family:var(--sans);font-size:14px;}
  .chat-input textarea:focus{outline:none;border-color:var(--accent);}
  .chat-send{flex-shrink:0;width:44px;height:44px;border-radius:12px;border:none;background:var(--accent);color:#1a1206;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .chat-send:disabled{opacity:.5;cursor:default;}
  .nav-ic{position:relative;}
  .nav-bubble{position:absolute;top:-7px;right:-10px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:#f87171;color:#fff;font-size:9.5px;font-family:var(--mono);font-weight:600;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
  .person-dot{width:8px;height:8px;border-radius:50%;background:#f87171;margin-left:3px;}
  /* Comments */
  .comments{border-top:1px solid var(--line);padding-top:14px;margin-top:6px;}
  .cmt-empty{color:var(--dim);font-size:13px;line-height:1.5;margin-bottom:12px;}
  .cmt{padding:10px 0;border-bottom:1px solid var(--line);}
  .cmt:first-of-type{padding-top:0;}
  .cmt-head{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .cmt-av{width:24px;height:24px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;flex-shrink:0;}
  .cmt-name{font-size:13px;font-weight:600;color:var(--txt);}
  .cmt-time{font-family:var(--mono);font-size:10.5px;color:var(--dim);}
  .cmt-del{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;display:flex;padding:3px;border-radius:6px;}
  .cmt-del:hover{color:var(--danger);background:rgba(248,113,113,.1);}
  .cmt-del svg{width:14px;height:14px;}
  .cmt-body{font-size:14px;color:var(--txt2);line-height:1.5;white-space:pre-wrap;word-break:break-word;padding-left:32px;}
  .cmt-input{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
  .cmt-input textarea{resize:vertical;min-height:46px;font-family:var(--sans);}
  .cmt-input .foot-btn{align-self:flex-end;}
  /* Multiple code blocks */
  .code-wrap + .code-wrap{margin-top:10px;}
  .readmore{margin-top:8px;background:none;border:none;color:var(--accent);font-size:12.5px;font-family:var(--sans);cursor:pointer;padding:4px 0;align-self:flex-start;}
  .readmore:hover{text-decoration:underline;}
  .blocks-edit{display:flex;flex-direction:column;gap:12px;}
  .blockedit{border:1px solid var(--line);border-radius:12px;padding:10px;background:var(--code);}
  .blockedit-top{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .block-title{flex:1 1 160px;min-width:0;font-family:var(--sans)!important;font-size:13px;padding:8px 10px;}
  .langpick{display:flex;align-items:center;gap:7px;flex-shrink:0;margin-left:auto;}
  .langpick>span{font-size:11px;color:var(--dim);font-family:var(--sans);}
  .blockedit .langsel{margin-left:0;flex-shrink:0;}
  .block-del{flex-shrink:0;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .block-del:hover{color:var(--danger);border-color:rgba(248,113,113,.4);}
  .addblock{align-self:flex-start;display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);border:1px solid rgba(245,165,36,.35);color:var(--accent);padding:8px 13px;border-radius:10px;font-size:13px;font-family:var(--sans);cursor:pointer;}
  .addblock:hover{border-color:var(--accent);}
  /* Template fill */
  .tplfill{border:1px solid rgba(245,165,36,.3);background:var(--accent-soft);border-radius:12px;padding:12px 14px;margin-bottom:12px;}
  .tplfields{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:6px;}
  .tplfield{display:flex;flex-direction:column;gap:4px;}
  .tplfield span{font-family:var(--mono);font-size:11px;color:var(--accent);}
  .tplfield input{padding:8px 10px;font-family:var(--mono);font-size:13px;}
  .tplhint{font-size:12px;color:var(--dim);margin-top:2px;}
  .tplhint code{font-family:var(--mono);background:var(--code);padding:1px 5px;border-radius:5px;color:var(--accent);}
  /* Checklist display */
  .checklist{margin-top:4px;}
  .cl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .cl-prog{font-family:var(--mono);font-size:12px;color:var(--txt2);display:inline-flex;align-items:center;gap:5px;}
  .cl-prog.done{color:var(--ok);}
  .cl-prog.done svg{width:14px;height:14px;}
  .cl-reset{background:none;border:1px solid var(--line);color:var(--dim);font-size:11px;border-radius:8px;padding:4px 9px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);}
  .cl-reset:hover{color:var(--accent);border-color:var(--accent);}
  .cl-reset svg{width:12px;height:12px;}
  .cl-items{display:flex;flex-direction:column;gap:6px;}
  .cl-item{display:flex;align-items:flex-start;gap:10px;text-align:left;background:var(--code);border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;font-family:var(--sans);color:var(--txt);width:100%;}
  .cl-item:hover{border-color:var(--line-strong);}
  .cl-item.ro{cursor:default;}
  .cl-box{flex-shrink:0;width:20px;height:20px;border-radius:6px;border:2px solid var(--line-strong);display:flex;align-items:center;justify-content:center;color:#fff;margin-top:1px;}
  .cl-box svg{width:13px;height:13px;}
  .cl-item.done .cl-box{background:var(--ok,#34d399);border-color:var(--ok,#34d399);}
  .cl-text{font-size:14px;line-height:1.4;}
  .cl-item.done .cl-text{text-decoration:line-through;color:var(--dim);}
  /* Steps editor */
  .steps-edit{display:flex;flex-direction:column;gap:8px;}
  .stepedit{display:flex;align-items:center;gap:8px;}
  .step-num{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;}
  .stepedit input{flex:1;min-width:0;}
  .typechip.is-check{background:rgba(52,211,153,.14);color:#34d399;}
  /* File attachments */
  .filelist{display:flex;flex-direction:column;gap:7px;}
  .card-files,.detail-files{margin-top:12px;}
  .fileitem{display:flex;align-items:center;gap:10px;background:var(--code);border:1px solid var(--line);border-radius:10px;padding:9px 12px;text-decoration:none;color:var(--txt);}
  .fileitem.dl:hover{border-color:var(--accent);}
  .file-ic{flex-shrink:0;color:var(--accent);display:flex;}
  .file-ic svg{width:16px;height:16px;}
  .file-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;}
  .file-size{flex-shrink:0;font-family:var(--mono);font-size:11px;color:var(--dim);}
  .file-dl{flex-shrink:0;color:var(--dim);display:flex;}
  .file-dl svg{width:15px;height:15px;}
  .fileitem.dl:hover .file-dl{color:var(--accent);}
  .file-del{flex-shrink:0;background:none;border:none;color:var(--dim);cursor:pointer;display:flex;padding:3px;border-radius:6px;}
  .file-del:hover{color:var(--danger);background:rgba(248,113,113,.1);}
  .file-del svg{width:14px;height:14px;}
  .file-more{font-size:12px;color:var(--dim);padding:2px 2px;}
  .filesection{margin-top:16px;}
  /* QR modal */
  .qroverlay{z-index:60;}
  .qrmodal{max-width:360px;}
  .qr-title{font-size:15px;font-weight:600;color:var(--txt);margin:0 0 14px;}
  .qrbox{display:inline-flex;align-items:center;justify-content:center;background:#fff;padding:14px;border-radius:14px;min-height:160px;min-width:160px;}
  .qrbox img,.qrbox canvas{display:block;}
  .qr-hint{font-size:12.5px;color:var(--dim);line-height:1.5;margin:14px auto 0;max-width:280px;}
  .qr-link{font-family:var(--mono);font-size:11px;color:var(--txt2);background:var(--code);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:12px;word-break:break-all;}
  .qr-actions{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
  /* What's new feed */
  .feed{display:flex;flex-direction:column;}
  .feed-row{display:flex;align-items:flex-start;gap:11px;padding:10px 4px;border:none;border-bottom:1px solid var(--line);background:none;cursor:pointer;text-align:left;width:100%;}
  .feed-row:last-child{border-bottom:none;}
  .feed-row:hover{background:var(--accent-soft);border-radius:8px;}
  .feed-ic{flex-shrink:0;display:flex;margin-top:2px;}
  .feed-ic svg{width:17px;height:17px;}
  .feed-main{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1;}
  .feed-title{font-size:14px;color:var(--txt);font-weight:500;display:flex;align-items:center;gap:8px;}
  .feed-new{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:#f87171;color:#fff;border-radius:5px;padding:1px 6px;flex-shrink:0;}
  .feed-meta{font-size:12px;color:var(--dim);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  /* Push notif button */
  .notifbtn{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;background:var(--code);border:1px solid var(--line-strong);color:var(--txt2);border-radius:10px;padding:8px 12px;font-size:13px;font-family:var(--sans);cursor:pointer;}
  .notifbtn:hover{border-color:var(--accent);color:var(--accent);}
  .notifbtn svg{width:15px;height:15px;}
  .notifbtn.on{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.4);color:#34d399;cursor:default;}
  .notifmsg{font-size:12.5px;color:var(--dim);margin:-4px 0 12px;}
  .pdfbtn{display:inline-flex;align-items:center;gap:6px;background:var(--code);border:1px solid var(--line);color:var(--txt2);border-radius:9px;padding:6px 11px;font-size:12.5px;font-family:var(--sans);cursor:pointer;}
  .pdfbtn:hover{border-color:var(--accent);color:var(--accent);}
  .pdfbtn svg{width:15px;height:15px;}
  /* Display modes: large text + high contrast */
  .hbtn.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
  body.bigtext .main{zoom:1.16;}
  body.bigtext .modal{zoom:1.12;}
  body.contrast{background:#ffffff !important;}

{title:"Läsa UDT-parameter (ENGMAX/ENGMIN/UNIT)",category:"Scripting",tags:["udt","getConfiguration","perspective"],is_code:true,content:`# system.tag.browse returnerar INTE parametervärden – använd getConfiguration.
# Parametrar nås med .value (dot-access), inte ["value"] eller .get("value").
# tagPath MÅSTE ha provider-prefix: [Vatten05]HST/VVV/TOR/PLC1/NG1/NG1

def transform(self, value, event):
    import system
    tagPath = value
    if not tagPath: return None
    isUdt = False
    try:
        parentPath = "/".join(tagPath.split("/")[:-1])
        tagName    = tagPath.split("/")[-1]
        for r in system.tag.browse(parentPath, {"tagType":"UdtInstance"}).getResults():
            if str(r.get("name")) == tagName: isUdt = True; break
    except: pass
    try:
        if isUdt:
            params = system.tag.getConfiguration(tagPath, False)[0].get("parameters", {})
            engmax = params.get("ENGMAX", None)
            return engmax.value if engmax else None     # .value, inte .get!
        qv = system.tag.readBlocking([tagPath + ".engHigh"])[0]
        return qv.value if qv.quality.isGood() else None
    except Exception as e:
        system.perspective.print("[engHigh] " + str(e)); return None`},

def runAction(self, event):
    import time
    PULSE = ["LARM_M_KVITT","LARM_M_RESET","LARM_M_RST"]; DELAY = 3
    eventId = self.view.params.eventId; tagPath = self.view.params.tagPath
    if not eventId or not tagPath: return
    user = self.session.props.auth.user.userName
    system.alarm.acknowledge([eventId], "", user)
    folder = '/'.join(tagPath.split('/')[:-1])
    tags = [t for t in ["%s/%s"%(folder,s) for s in PULSE] if system.tag.exists(t)]
    if tags:
        system.tag.writeBlocking(tags, [True]*len(tags))
        time.sleep(DELAY)
        system.tag.writeBlocking(tags, [False]*len(tags))`},

function pushSupported(){ return typeof window!=="undefined" && "Notification" in window && "serviceWorker" in navigator && "PushManager" in window; }
async function enablePush(token, uid){
  if(!pushSupported()) throw new Error("Aviseringar stöds inte här. På iPhone: lägg först till appen på hemskärmen, öppna den därifrån och försök igen.");
  const perm = await Notification.requestPermission();
  if(perm!=="granted") throw new Error("Du behöver tillåta aviseringar i webbläsaren.");
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if(!sub){ sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlB64ToUint8(VAPID_PUBLIC) }); }
  const r = await fetch(pushBase + "?on_conflict=endpoint", {method:"POST", headers:{...dataHeaders(token), Prefer:"resolution=merge-duplicates"}, body: JSON.stringify([{ user_id:uid, endpoint:sub.endpoint, subscription:sub.toJSON() }])});
  if(!r.ok && r.status!==409){ let d={}; try{ d=await r.json(); }catch(e){} throw new Error(d.message||("Kunde inte spara prenumerationen ("+r.status+")")); }
  return true;
}
function exportEntriesPDF(list, heading){
  if(!(window.jspdf && window.jspdf.jsPDF)){ alert("PDF-biblioteket kunde inte laddas (kräver internet första gången)."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"a4"});
  const M=48, W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), CW=W-M*2;
  let y=M;
  function need(h){ if(y+h>H-M){ doc.addPage(); y=M; } }
  function text(str, o){ o=o||{}; const size=o.size||10, lh=size*1.35; doc.setFont(o.font||"helvetica", o.style||"normal"); doc.setFontSize(size); const c=o.color||[25,25,25]; doc.setTextColor(c[0],c[1],c[2]); const lines=doc.splitTextToSize(String(str||""), o.width||CW); for(const ln of lines){ need(lh); doc.text(ln, o.x||M, y); y+=lh; } }
  function rule(col){ need(2); doc.setDrawColor(col||230); doc.line(M,y,W-M,y); y+=14; }
  text(heading||"SCADA-KB", {size:16, style:"bold"});
  text(new Date().toLocaleString("sv-SE",{dateStyle:"medium",timeStyle:"short"})+"  ·  "+list.length+" poster", {size:9, color:[130,130,130]});
  y+=6; rule(210);
  list.forEach(e=>{
    need(46);
    text(e.title, {size:13, style:"bold"});
    const meta=[(e.system||"Ignition"), e.category, e.station].filter(Boolean).join("   ·   ");
    if(meta) text(meta, {size:9, color:[120,120,120]});
    if(e.tags&&e.tags.length) text("Taggar: "+e.tags.join(", "), {size:9, color:[120,120,120]});
    y+=4;
    const kind=(e.checklist&&e.checklist.length)?"checklist":(((e.blocks&&e.blocks.length)||e.is_code)?"code":"note");
    if(e.notes && e.notes.trim()) text(e.notes, {size:10});
    if(kind==="note"){ text(e.content||"", {size:10}); }
    else if(kind==="checklist"){ (e.checklist||[]).forEach(s=>text("[ ]  "+s, {size:10})); }
    else if(kind==="code"){
      const blocks=(e.blocks&&e.blocks.length)?e.blocks:[{title:"",code:e.content||"",lang:e.lang}];
      blocks.forEach(b=>{ if(b.title) text(b.title, {size:9, style:"bold", color:[90,90,90]}); text(b.code||"", {size:8.5, font:"courier", color:[40,40,40]}); y+=4; });
    }
    if(e.images&&e.images.length) text("("+e.images.length+" bild"+(e.images.length>1?"er":"")+" finns i appen)", {size:8.5, color:[150,150,150]});
    if(e.files&&e.files.length) text("Bilagor: "+e.files.map(f=>f.name).join(", "), {size:9, color:[120,120,120]});
    y+=10; rule(238);
  });
  const pages=doc.internal.getNumberOfPages();
  for(let p=1;p<=pages;p++){ doc.setPage(p); doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(160); doc.text("SCADA-KB  ·  sida "+p+"/"+pages, M, H-20); }
  const fname=(heading||"scada-kb").replace(/[^a-z0-9åäöÅÄÖ ]/gi,"").trim().replace(/\s+/g,"-").toLowerCase()||"scada-kb";
  doc.save(fname+".pdf");
}

function dropCols(x, cols){ const f=o=>{const c={...o}; cols.forEach(k=>delete c[k]); return c;}; return Array.isArray(x)?x.map(f):f(x); }
async function saveWithFallback(url, method, payload, token){
  let body = payload, dropped = [];
  for(let i=0; i<OPTIONAL_COLS.length+1; i++){
    const r = await fetch(url, {method, headers:{...dataHeaders(token), Prefer:"return=representation"}, body: JSON.stringify(body)});
    if(r.status!==400) return r;
    let msg=""; try{ const d=await r.clone().json(); msg=((d.message||"")+" "+(d.details||"")+" "+(d.hint||"")).toLowerCase(); }catch(e){}
    const col = OPTIONAL_COLS.find(c=>dropped.indexOf(c)<0 && msg.indexOf("'"+c+"'")>=0);
    if(col){ dropped.push(col); body = dropCols(body, [col]); continue; }       // drop just the missing column
    const rest = OPTIONAL_COLS.filter(c=>dropped.indexOf(c)<0);
    if(rest.length){ dropped = dropped.concat(rest); body = dropCols(body, rest); continue; } // unknown cause: drop remaining once
    return r;
  }
  return fetch(url, {method, headers:{...dataHeaders(token), Prefer:"return=representation"}, body: JSON.stringify(body)});
}

      if(!s || !s.refresh_token){ setBooting(false); return; }
      try{
        let access=s.access_token, uidV=s.uid, emailV=s.email, nameV=s.name;
        if(!access || !s.expires_at || Date.now() > s.expires_at - 60000){
          const d = await refreshSession(s.refresh_token);
          saveSession(d);
          access=d.access_token;
          uidV=(d.user&&d.user.id)||uidV; emailV=(d.user&&d.user.email)||emailV; nameV=metaName(d)||nameV;
        }
        setToken(access); setUser(emailV); setName(nameV); setUid(uidV); setProfile(undefined);
        try{ setProfile(await getMyProfile(access, uidV, emailV)); }
        catch(e){ setProfile({approved:true,is_admin:false,_legacy:true}); }
      }catch(e){ clearSession(); }
      setBooting(false);
    })();
  },[]);

  // Förnya token automatiskt så man hålls inloggad
  useEffect(()=>{
    if(!token) return;
    async function ensureFresh(){
      const s = loadSession(); if(!s || !s.refresh_token) return;
      if(Date.now() > (s.expires_at||0) - 120000){
        try{ const d=await refreshSession(s.refresh_token); saveSession(d); setToken(d.access_token); }catch(e){}
      }
    }
    const iv=setInterval(ensureFresh, 60000);
    const onVis=()=>{ if(document.visibilityState==="visible") ensureFresh(); };
    document.addEventListener("visibilitychange", onVis);
    return ()=>{ clearInterval(iv); document.removeEventListener("visibilitychange", onVis); };
  },[token]);

  const [updateReady,setUpdateReady]=useState(false);
  const swWaitingRef=useRef(null);
  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    let reloaded=false, onVis=null;
    const onCtrl=()=>{ if(reloaded) return; reloaded=true; window.location.reload(); };
    navigator.serviceWorker.addEventListener("controllerchange", onCtrl);
    navigator.serviceWorker.getRegistration().then(function(reg){
      if(!reg) return;
      const mark=function(w){ if(w && navigator.serviceWorker.controller){ swWaitingRef.current=w; setUpdateReady(true); } };
      if(reg.waiting) mark(reg.waiting);
      reg.addEventListener("updatefound", function(){ const w=reg.installing; if(!w) return; w.addEventListener("statechange", function(){ if(w.state==="installed") mark(w); }); });
      const check=function(){ try{ reg.update(); }catch(e){} };
      check();
      onVis=function(){ if(document.visibilityState==="visible") check(); };
      document.addEventListener("visibilitychange", onVis);
    }).catch(function(){});
    return function(){ navigator.serviceWorker.removeEventListener("controllerchange", onCtrl); if(onVis) document.removeEventListener("visibilitychange", onVis); };
  },[]);
  function applyUpdate(){
    const w=swWaitingRef.current;
    if(w){ try{ w.postMessage("skipWaiting"); }catch(e){ window.location.reload(); } }
    else { window.location.reload(); }
  }

  let view;
  if (!configured) view = (<div className="wrap"><div className="banner err" style={{marginTop:40}}>Inte konfigurerad. Fyll i <b>SUPABASE_URL</b> och <b>SUPABASE_KEY</b>.</div></div>);
  else if (booting) view = (<div className="login-wrap"><div className="login-card" style={{textAlign:"center"}}><div className="login-logo">{Ico.db}</div><p>Laddar…</p></div></div>);
  else if (!token) view = <Login onLogin={afterLogin} theme={theme} onToggleTheme={toggleTheme} />;
  else if (profile===undefined) view = (<div className="login-wrap"><div className="login-card" style={{textAlign:"center"}}><div className="login-logo">{Ico.db}</div><p>Laddar…</p></div></div>);
  else if (profile && !profile.approved && !profile._legacy) view = <Pending email={user} onLogout={logout} theme={theme} onToggleTheme={toggleTheme} />;
  else view = <KB token={token} user={user} name={name} uid={uid} isAdmin={!!(profile&&profile.is_admin)} onName={setName} theme={theme} onToggleTheme={toggleTheme} bigText={bigText} onToggleBig={toggleBig} contrast={contrast} onToggleContrast={toggleContrast} onLogout={logout} />;
  return (<>{updateReady && <div className="update-bar"><span>{Ico.spark} Ny version finns</span><button onClick={applyUpdate}>Uppdatera</button></div>}{view}</>);
}

function Login({onLogin,theme,onToggleTheme}){
  const [mode,setMode]=useState("login"); // login | signup
  const [email,setEmail]=useState(""); const [pw,setPw]=useState(""); const [namn,setNamn]=useState("");

    if(!email||!pw||(signup&&!namn.trim())) return;
    setBusy(true); setErr(""); setInfo("");
    try{
      if(signup){
        const d = await signUp(email.trim(), pw, namn.trim());
        if(d.access_token){ onLogin(d); }            // ingen mailbekräftelse → in i väntläge
        else { setInfo("Konto skapat! Det måste godkännas av en administratör innan du kan logga in."); setMode("login"); }
      }else{

  }
  return (

        {err && <div className="banner err" style={{marginTop:0}}>{err}</div>}
        {info && <div className="banner" style={{marginTop:0,background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.3)",color:"#6ee7b7"}}>{info}</div>}
        {signup && <label><span className="lbl">Namn</span>
          <input value={namn} onChange={e=>setNamn(e.target.value)} placeholder="Förnamn Efternamn" onKeyDown={e=>e.key==='Enter'&&submit()} /></label>}
        <label><span className="lbl">E-post</span>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="namn@kommun.se" onKeyDown={e=>e.key==='Enter'&&submit()} /></label>
        <label><span className="lbl">Lösenord</span>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} /></label>
        <button className="btn-amber" style={{width:"100%",marginTop:8,padding:"11px"}} disabled={busy||!email||!pw||(signup&&!namn.trim())} onClick={submit}>
          {busy?(signup?"Skapar…":"Loggar in…"):(signup?"Skapa konto":"Logga in")}
        </button>
        <button className="link-btn" onClick={()=>{setMode(signup?"login":"signup");setErr("");setInfo("");}}>
          {signup?"Har du redan konto? Logga in":"Inget konto? Skapa ett"}
        </button>
      </div>
    </div>
  );
}

      if(activeCat!=="Alla"&&e.category!==activeCat) return false;
      if(activeTags.length){ const et=(e.tags||[]).map(t=>(t||"").toLowerCase()); if(!activeTags.every(t=>et.indexOf(t.toLowerCase())>=0)) return false; }
      if(activeStation!=="Alla" && (e.station||"")!==activeStation) return false;
      if(!q) return true;
      return (e.title+" "+e.content+" "+(e.notes||"")+" "+(e.author||"")+" "+(e.station||"")+" "+(e.tags||[]).join(" ")).toLowerCase().includes(q);
    });
    list=list.slice().sort((a,b)=>{
      if(!!b.pinned!==!!a.pinned) return (b.pinned?1:0)-(a.pinned?1:0);
      if(sortBy==="titel") return (a.title||"").localeCompare(b.title||"","sv");
      if(sortBy==="kategori") return (a.category||"").localeCompare(b.category||"","sv");
      return (b.updated_at||"").localeCompare(a.updated_at||"");
    });
    return list;
  },[entries,search,activeSystem,activeCat,sortBy,activeTags,activeStation]);

  const stationList=useMemo(()=>{ const set=[]; entries.forEach(e=>{ const s=(e.station||"").trim(); if(s&&set.indexOf(s)<0) set.push(s); }); set.sort((a,b)=>a.localeCompare(b,"sv")); return set; },[entries]);
  const stationGeoCacheKey="scada-stationgeo";
  const [stationGeo,setStationGeo]=useState(function(){ try{ return JSON.parse(localStorage.getItem(stationGeoCacheKey)||"{}"); }catch(e){ return {}; } });
  useEffect(()=>{ if(!token) return; (async()=>{
    try{
      const r=await fetch(stationGeoBase+"?select=name,lat,lng", {headers:dataHeaders(token)});
      if(!r.ok) return;
      const rows=await r.json(); const map={};
      rows.forEach(x=>{ if(x&&x.name&&x.lat!=null&&x.lng!=null) map[x.name]={lat:x.lat,lng:x.lng}; });
      setStationGeo(map); try{ localStorage.setItem(stationGeoCacheKey, JSON.stringify(map)); }catch(e){}
    }catch(e){}
  })(); },[token]);
  const stationPoints=useMemo(()=>Object.keys(stationGeo).map(n=>({name:n,lat:stationGeo[n].lat,lng:stationGeo[n].lng})).filter(p=>isFinite(p.lat)&&isFinite(p.lng)),[stationGeo]);
  async function saveStationGeo(name, lat, lng){
    lat=Number(lat); lng=Number(lng);
    if(!name || !isFinite(lat) || !isFinite(lng)) return;
    const next={...stationGeo, [name]:{lat,lng}}; setStationGeo(next);
    try{ localStorage.setItem(stationGeoCacheKey, JSON.stringify(next)); }catch(e){}
    try{ await fetch(stationGeoBase+"?on_conflict=name", {method:"POST", headers:{...dataHeaders(token), Prefer:"resolution=merge-duplicates"}, body:JSON.stringify([{name,lat,lng,updated_at:new Date().toISOString()}])}); }catch(e){}
    flash("Position sparad för "+name);
  }
  const sysScope=useMemo(()=>activeSystem==="Alla"?entries:entries.filter(e=>(e.system||"Ignition")===activeSystem),[entries,activeSystem]);
  const counts=useMemo(()=>{const c={}; sysScope.forEach(e=>c[e.category]=(c[e.category]||0)+1); return c;},[sysScope]);
  const sysCounts=useMemo(()=>{const c={}; entries.forEach(e=>{const s=e.system||"Ignition"; c[s]=(c[s]||0)+1;}); return c;},[entries]);
  const [customSys,setCustomSys]=useState(loadSysList);
  const [showSys,setShowSys]=useState(false);
  useEffect(()=>{ if(!token) return; (async()=>{
    try{
      const r=await fetch(sysBase+"?select=name&order=name.asc", {headers:dataHeaders(token)});
      if(!r.ok) return; // tabell ej uppsatt än → behåll lokal lista
      const rows=await r.json(); let names=rows.map(x=>x.name).filter(Boolean);
      const local=loadSysList(); const missing=local.filter(n=>n&&!names.includes(n));
      if(missing.length){ try{ await fetch(sysBase, {method:"POST", headers:{...dataHeaders(token), Prefer:"resolution=ignore-duplicates"}, body:JSON.stringify(missing.map(n=>({name:n})))}); names=names.concat(missing); }catch(e){} }
      setCustomSys(names); saveSysList(names);
    }catch(e){}
  })(); },[token]);
  const systems=useMemo(()=>{ const out=[]; const add=n=>{ n=(n||"").trim(); if(n&&!out.includes(n)) out.push(n); }; SYSTEMS.forEach(add); customSys.forEach(add); entries.forEach(e=>add(e.system||"Ignition")); return out; },[customSys,entries]);
  async function addSystem(name){ name=(name||"").trim(); if(!name||systems.includes(name)) return; const next=[...customSys,name]; setCustomSys(next); saveSysList(next); try{ await fetch(sysBase, {method:"POST", headers:{...dataHeaders(token), Prefer:"resolution=ignore-duplicates"}, body:JSON.stringify([{name}])}); }catch(e){} }
  async function removeSystem(name){ if(SYSTEMS.includes(name)) return; if((sysCounts[name]||0)>0) return; const next=customSys.filter(s=>s!==name); setCustomSys(next); saveSysList(next); try{ await fetch(sysBase+"?name=eq."+encodeURIComponent(name), {method:"DELETE", headers:dataHeaders(token)}); }catch(e){} }
  const pinnedCount=useMemo(()=>entries.filter(e=>e.pinned).length,[entries]);
  const codeCount=useMemo(()=>entries.filter(e=>e.is_code).length,[entries]);
  const noteCount=useMemo(()=>entries.filter(e=>!e.is_code).length,[entries]);
  const topicCounts=useMemo(()=>{const c={}; entries.forEach(e=>c[e.category]=(c[e.category]||0)+1); return c;},[entries]);
  const viewList=useMemo(()=>filtered.filter(e=>{
    if(activeView==="kod" && !e.is_code) return false;
    if(activeView==="anteckningar" && e.is_code) return false;
    if(scope==="mina" && !(e.user_id===uid || !e.user_id)) return false;
    if(scope==="delade" && !e.shared) return false;
    if(scope==="offline" && offlineSet.indexOf(e.id)<0) return false;
    if(scope==="favoriter" && favSet.indexOf(e.id)<0) return false;
    return true;
  }),[filtered,activeView,scope,uid,offlineSet,favSet]);

  function exportPostPdf(entry){ setPrintData({mode:"post",items:[entry],label:entry.title}); }
  function exportListPdf(){ const lbl=(activeCat!=="Alla"?activeCat:(activeView==="kod"?"Kod":activeView==="anteckningar"?"Anteckningar":"Bibliotek")); setPrintData({mode:"list",items:viewList,label:lbl}); }
  useEffect(()=>{
    if(!printData) return;
    document.body.classList.add("printing");
    const t=setTimeout(()=>{ try{ window.print(); }catch(e){} },200);
    const done=()=>setPrintData(null);
    window.addEventListener("afterprint",done);
    return ()=>{ clearTimeout(t); window.removeEventListener("afterprint",done); document.body.classList.remove("printing"); };
  },[printData]);

  return (
    <>
    <div className="app">
      <Nav active={activeView} onNav={v=>setActiveView(v)} onUsers={()=>setShowUsers(true)} chatUnread={totalUnread}
        counts={{bibliotek:entries.length,kod:codeCount,anteckningar:noteCount}}
        user={display} onLogout={onLogout} onExport={exportData} onImport={()=>fileRef.current.click()} busy={busy} />
      <input ref={fileRef} type="file" accept="application/json" onChange={importData} style={{display:"none"}} />

      <main className="main">
        <div className="topbar">
          <div className="topbar-user">{Ico.users}<span className="topbar-email">{display}</span></div>

            <button className={"hbtn"+(contrast?" on":"")} title="Hög kontrast (sol)" onClick={onToggleContrast}>{Ico.contrast}</button>
            <button className="hbtn" title="Exportera (backup)" onClick={exportData}>{Ico.down}</button>
            <button className="hbtn" title="Importera" onClick={()=>fileRef.current.click()}>{Ico.up}</button>

            <button className="hbtn" title="Logga ut" onClick={onLogout}>{Ico.out}</button>
          </div>
        </div>
        {error && <div className="banner err">{error}</div>}

        {activeView==="oversikt" ? (
          <Dashboard entries={entries} sysCounts={sysCounts} systems={systems} topicCounts={topicCounts}
            codeCount={codeCount} noteCount={noteCount} pinnedCount={pinnedCount} loading={loading} user={display} uid={uid}
            recentOpened={recentIds.map(id=>entries.find(e=>e.id===id)).filter(Boolean).slice(0,6)}
            stationPoints={stationPoints} onPickStation={s=>{setActiveStation(s);setActiveSystem("Alla");setActiveCat("Alla");setSearch("");setActiveView("bibliotek");}}
            favCount={favSet.length} onOpenFavorites={()=>{setScope("favoriter");setActiveView("bibliotek");}}
            onOpenLibrary={cat=>{setActiveCat(cat||"Alla");setActiveSystem("Alla");setSearch("");setActiveView("bibliotek");}}
            onAdd={()=>setEditing({})} onQuickAdd={isCode=>setEditing({is_code:isCode})}
            onTag={t=>{toggleTag(t);setActiveView("bibliotek");}}
            onOpen={openDetail} loadExamples={loadExamples} />
        ) : activeView==="chatt" ? (
          <ChatView token={token} uid={uid} name={name} user={user} display={display} unreadMap={unreadMap} onSeen={markConvSeen} />
        ) : (
          <>
            <div className="page-head">
              <div>
                <div className="crumbs page-crumbs"><span>SCADA·KB</span>{Ico.chevR}<span style={{color:"var(--txt)"}}>{activeView==="kod"?"Kod":activeView==="anteckningar"?"Anteckningar":"Bibliotek"}</span>{activeSystem!=="Alla"&&<>{Ico.chevR}<span style={{color:colorForSys(activeSystem)}}>{activeSystem}</span></>}{activeCat!=="Alla"&&<>{Ico.chevR}<span style={{color:CAT_COLOR[activeCat]}}>{activeCat}</span></>}</div>
                <h2 className="page-title">{activeView==="kod"?"Kod":activeView==="anteckningar"?"Anteckningar":"Bibliotek"}</h2>
                <p className="page-sub">{activeView==="kod"?"Kodsnuttar och script":activeView==="anteckningar"?"Anteckningar och rutiner":"Alla poster i kunskapsbasen"}</p>
              </div>
              <button className="btn-amber addbtn" onClick={()=>setEditing({})}>{Ico.add} Ny post</button>
            </div>

            <div className="systabs">
              <button className={"systab"+(activeSystem==="Alla"?" active":"")} onClick={()=>{setActiveSystem("Alla");setActiveCat("Alla");}}>Alla system<span className="syscnt">{entries.length}</span></button>
              {systems.map(s=>(
                <button key={s} className={"systab"+(activeSystem===s?" active":"")} style={{"--sys":colorForSys(s)}} onClick={()=>{setActiveSystem(s);setActiveCat("Alla");}}>
                  <span className="sysdot" style={{background:colorForSys(s)}}></span>{s}<span className="syscnt">{sysCounts[s]||0}</span>
                </button>
              ))}
              <button className="systab sysmanage" onClick={()=>setShowSys(true)} title="Hantera system">{Ico.add} System</button>
            </div>

            <div className="search-box">{Ico.search}
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Sök i titel, kod, beskrivning, taggar…" /></div>

            <div className="chips">
              <Chip label="Alla ämnen" active={activeCat==="Alla"} color="#f5a524" count={sysScope.length} onClick={()=>setActiveCat("Alla")} />
              {CATEGORIES.map(c=><Chip key={c} label={c} active={activeCat===c} color={CAT_COLOR[c]} count={counts[c]||0} onClick={()=>setActiveCat(c)} />)}
            </div>

            <div className="scoperow">
              <button className={"scopebtn"+(scope==="alla"?" active":"")} onClick={()=>setScope("alla")}>Alla</button>
              <button className={"scopebtn"+(scope==="mina"?" active":"")} onClick={()=>setScope("mina")}>{Ico.lock} Mina</button>
              <button className={"scopebtn"+(scope==="delade"?" active":"")} onClick={()=>setScope("delade")}>{Ico.users} Delade</button>
              <button className={"scopebtn"+(scope==="offline"?" active":"")} onClick={()=>setScope("offline")}>{Ico.down} Offline{offlineSet.length>0?" ("+offlineSet.length+")":""}</button>
              <button className={"scopebtn"+(scope==="favoriter"?" active":"")} onClick={()=>setScope("favoriter")}>{Ico.star} Favoriter{favSet.length>0?" ("+favSet.length+")":""}</button>
            </div>

            {activeTags.length>0 && (
              <div className="activetags">
                <span className="activetags-lbl">Taggar:</span>
                {activeTags.map(t=><button key={t} className="atag" onClick={()=>toggleTag(t)}>#{t}{Ico.x}</button>)}
                <button className="atag-clear" onClick={()=>setActiveTags([])}>Rensa</button>
              </div>
            )}

            {stationList.length>0 && (
              <div className="stationrow">
                <span className="station-lbl">{Ico.pin} Station:</span>
                <select className="sortsel station-sel" value={activeStation} onChange={e=>setActiveStation(e.target.value)}>
                  <option value="Alla">Alla stationer</option>
                  {stationList.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                {activeStation!=="Alla" && <button className="atag-clear" onClick={()=>setActiveStation("Alla")}>Rensa</button>}
              </div>
            )}

            <div className="subbar">
              <span className="resultcnt">{viewList.length} {viewList.length===1?"post":"poster"}{pinnedCount>0?" · "+pinnedCount+" ★":""}</span>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <button className="pdfbtn" onClick={()=>exportEntriesPDF(viewList, activeCat!=="Alla"?activeCat:(activeStation&&activeStation!=="Alla"?activeStation:"SCADA-KB – bibliotek"))} title="Exportera vyn som PDF">{Ico.report} PDF</button>
                <div className="density">
                  <button className={"denbtn"+(density==="kort"?" active":"")} onClick={()=>setDensity("kort")} title="Kortvy">{Ico.grid}</button>
                  <button className={"denbtn"+(density==="kompakt"?" active":"")} onClick={()=>setDensity("kompakt")} title="Kompakt vy">{Ico.rows}</button>
                </div>
                <div className="sortwrap">{Ico.sort}
                  <select className="sortsel" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                    <option value="senaste">Senaste</option>
                    <option value="titel">A–Ö</option>
                    <option value="kategori">Ämne</option>
                  </select>
                </div>
              </div>
            </div>

            {activeStation!=="Alla" && (()=>{ const inSt=entries.filter(e=>(e.station||"")===activeStation); return (
              <>
              <div className="station-head">
                <div className="station-head-main">
                  <span className="station-head-icon">{Ico.pin}</span>
                  <div style={{minWidth:0}}>
                    <h2 className="station-head-name">{activeStation}</h2>
                    <p className="station-head-sub">{inSt.length} {inSt.length===1?"post":"poster"} på den här stationen</p>
                  </div>
                </div>
                <div className="station-head-actions">
                  <button className="foot-mini" onClick={()=>takeStationOffline(activeStation)}>{Ico.down} Ta hela stationen offline</button>
                  <button className="foot-mini" onClick={()=>exportEntriesPDF(inSt, activeStation)}>{Ico.report} PDF</button>
                  <button className="foot-mini" onClick={()=>setActiveStation("Alla")}>{Ico.x} Stäng</button>
                </div>
              </div>
              <StationMap station={activeStation} coord={stationGeo[activeStation]} onSet={(la,ln)=>saveStationGeo(activeStation,la,ln)} />
              </>
            ); })()}

            {loading ? (
              <SkeletonCards />
            ) : viewList.length===0 ? (
              <EmptyState view={activeView} hasEntries={entries.length>0} onLoad={loadExamples} onAdd={()=>setEditing({})} />
            ) : density==="kompakt" ? (
              <div className="compactlist">
                {viewList.map(e=><CompactRow key={e.id} entry={e} mine={e.user_id===uid||!e.user_id} onOpen={()=>openDetail(e)} onPin={()=>togglePin(e)} />)}
              </div>
            ) : (
              <div className="cards">
                {viewList.map(e=><EntryCard key={e.id} entry={e} mine={e.user_id===uid||!e.user_id} copied={copiedId===e.id} offlineSaved={isOfflineSaved(e.id)} fav={isFav(e.id)} onFav={()=>toggleFav(e)} onStation={s=>{setActiveStation(s);setActiveSystem("Alla");setActiveCat("Alla");setSearch("");setActiveView("bibliotek");}} onCopy={()=>copyContent(e)} onEdit={()=>setEditing(e)} onDelete={()=>deleteEntry(e.id)} onPin={()=>togglePin(e)} onTag={t=>toggleTag(t)} onOpen={()=>openDetail(e)} />)}
              </div>
            )}
          </>
        )}
      </main>

      {toast && <div className="toast">{toast}</div>}
      {editing!==null && <EntryForm initial={editing} busy={busy} token={token} uid={uid} stations={stationList} systems={systems} onAddSystem={addSystem} onSave={saveEntry} onClose={()=>setEditing(null)} />}
      {showSys && <SystemModal systems={systems} counts={sysCounts} onAdd={addSystem} onRemove={removeSystem} onClose={()=>setShowSys(false)} />}
      {showTrash && <TrashModal items={trash} onRestore={restoreEntry} onPurge={purgeEntry} onEmpty={emptyTrash} onClose={()=>setShowTrash(false)} />}
      {detail && <DetailModal entry={detail} entries={entries} mine={detail.user_id===uid||!detail.user_id} token={token} uid={uid} name={name} user={user} display={display} offlineSaved={isOfflineSaved(detail.id)} onToggleOffline={()=>toggleOffline(detail)} fav={isFav(detail.id)} onFav={()=>toggleFav(detail)} onExportPdf={()=>exportPostPdf(detail)} onRestore={restoreVersion} onClose={()=>setDetail(null)} onOpen={openDetail} onEdit={e=>{setDetail(null);setEditing(e);}} onTag={t=>{setDetail(null);toggleTag(t);setActiveView("bibliotek");}} />}
      {showUsers && <UserModal token={token} user={user} name={name} isAdmin={isAdmin} onName={onName} backups={backups} onDownloadBackup={downloadBackup} onRestoreBackup={restoreBackup} onClose={()=>setShowUsers(false)} />}
    </div>
    {printData && <PrintView data={printData} />}
    </>
  );
}

function MiniRow({entry,onClick}){
  const color=CAT_COLOR[entry.category]||"#94a3b8";
  return <button className="minirow" onClick={onClick}>
    <span className="mini-ic" style={{color}}>{entry.is_code?Ico.terminal:Ico.note}</span>
    <span className="mini-title">{entry.title}</span>
    {entry.pinned&&<span className="mini-pin" style={{color:"var(--accent)"}}>{Ico.pin}</span>}
    <span className="mini-badge" style={{color,background:color+"22"}}>{entry.category}</span></button>;
}
function ActivityChart({entries}){
  const days=30;
  const today=new Date(); today.setHours(23,59,59,999);
  const buckets=new Array(days).fill(0);
  entries.forEach(e=>{
    if(!e.updated_at) return;
    const d=new Date(e.updated_at);
    if(isNaN(d)) return;
    const diff=Math.floor((today-d)/86400000);
    if(diff>=0 && diff<days) buckets[days-1-diff]++;
  });
  const max=Math.max(1,...buckets);
  const total=buckets.reduce((a,b)=>a+b,0);
  return (
    <div className="panel">
      <div className="panel-h">{Ico.chart} Aktivitet senaste 30 dagarna<span className="actcnt">{total} ändringar</span></div>
      <div className="actchart">
        {buckets.map((v,i)=><div key={i} className="actbar" title={v+" ändringar"}><div className="actbar-fill" style={{height:Math.max(3,Math.round(v/max*100))+"%",opacity:v?1:.22}}></div></div>)}
      </div>
      <div className="actaxis"><span>30 dgr sedan</span><span>idag</span></div>
    </div>
  );
}

function WhatsNew({entries, uid, onOpen}){
  const seenKey="scada-feed-seen-"+(uid||"x");
  const [lastSeen]=useState(function(){ try{ return localStorage.getItem(seenKey)||""; }catch(e){ return ""; } });
  const feed=entries.slice().sort((a,b)=>(b.updated_at||"").localeCompare(a.updated_at||"")).slice(0,10);
  useEffect(()=>{ const newest=feed.length?(feed[0].updated_at||""):""; if(newest){ try{ localStorage.setItem(seenKey,newest); }catch(e){} } },[]);
  if(feed.length===0) return null;
  function kindLabel(e){ const c=e.created_at||"", u=e.updated_at||""; if(!c) return "Uppdaterad"; return Math.abs(new Date(u)-new Date(c))<90000?"Ny":"Uppdaterad"; }
  return (
    <div className="panel">
      <div className="panel-h">{Ico.spark} Vad är nytt</div>
      <div className="feed">
        {feed.map(e=>{
          const isNew=lastSeen && (e.updated_at||"")>lastSeen;
          const mine=e.user_id===uid;
          const who=mine?"du":(e.author||"en kollega");
          const col=e.is_code?"#a78bfa":(e.checklist&&e.checklist.length)?"#34d399":"#60a5fa";
          const ic=e.is_code?Ico.terminal:(e.checklist&&e.checklist.length)?Ico.checklist:Ico.note;
          return <button key={e.id} className="feed-row" onClick={()=>onOpen(e)}>
            <span className="feed-ic" style={{color:col}}>{ic}</span>
            <span className="feed-main">
              <span className="feed-title">{e.title}{isNew?<span className="feed-new">Ny</span>:null}</span>
              <span className="feed-meta">{kindLabel(e)} · {who} · {fmtDateTime(e.updated_at)}{e.station?" · "+e.station:""}</span>
            </span>
          </button>;
        })}
      </div>
    </div>
  );
}

function DetailModal({entry,entries,mine=true,token,uid,name,user,display,offlineSaved,onToggleOffline,fav,onFav,onExportPdf,onRestore,onClose,onOpen,onEdit,onTag}){
  const color=CAT_COLOR[entry.category]||"#94a3b8";
  const sys=entry.system||"Ignition";
  const sysColor=colorForSys(sys);
  const tags=entry.tags||[];
  const [copied,setCopied]=useState(false);
  const [hist,setHist]=useState(null); const [histBusy,setHistBusy]=useState(false); const [restoring,setRestoring]=useState(false);
  const [comments,setComments]=useState(null); const [ctext,setCtext]=useState(""); const [csending,setCsending]=useState(false);
  useEffect(()=>{ let stop=false; listComments(token, entry.id).then(c=>{ if(!stop) setComments(c); }).catch(()=>{ if(!stop) setComments([]); }); return ()=>{ stop=true; }; },[entry.id]);
  async function postComment(){
    const b=ctext.trim(); if(!b||csending) return;
    setCsending(true);
    try{ const c=await addComment(token,{entry_id:entry.id, user_id:uid, author_name:(name||display||user), body:b}); setComments(x=>[...(x||[]),c]); setCtext(""); }
    catch(e){ alert(e.message); }
    setCsending(false);
  }
  async function removeComment(id){
    try{ await deleteComment(token,id); setComments(x=>(x||[]).filter(c=>c.id!==id)); }catch(e){ alert(e.message); }
  }
  async function openHist(){ setHistBusy(true); try{ setHist(await listVersions(token, entry.id)); }catch(e){ setHist([]); } setHistBusy(false); }
  async function doRestore(v){ setRestoring(true); try{ await onRestore(entry.id, v.snapshot); setHist(null); }catch(e){ alert("Kunde inte återställa: "+e.message); } setRestoring(false); }
  function copy(){ navigator.clipboard&&navigator.clipboard.writeText(entry.content); setCopied(true); setTimeout(()=>setCopied(false),1500); }
  const [copiedIdx,setCopiedIdx]=useState(-1);
  const [showQR,setShowQR]=useState(false);
  function copyBlock(codeStr,i){ navigator.clipboard&&navigator.clipboard.writeText(codeStr); setCopiedIdx(i); setTimeout(()=>setCopiedIdx(-1),1500); }
  const blocks=entryBlocks(entry);
  const tplVars=useMemo(()=>{
    if(!blocks) return [];
    const re=/\{\{\s*([a-zA-Z0-9_åäöÅÄÖ.\-]+)\s*\}\}/g; const out=[];
    blocks.forEach(b=>{ const code=b.code||""; let m; re.lastIndex=0; while((m=re.exec(code))){ if(out.indexOf(m[1])<0) out.push(m[1]); } });
    return out;
  },[entry.id]);
  const [vals,setVals]=useState({});
  function fill(code){ return (code||"").replace(/\{\{\s*([a-zA-Z0-9_åäöÅÄÖ.\-]+)\s*\}\}/g,(m,k)=>(vals[k]&&vals[k].length)?vals[k]:m); }
  const related=entries.filter(e=>e.id!==entry.id).map(e=>{
    let score=0;
    if(e.category===entry.category) score+=2;
    if((e.system||"Ignition")===sys) score+=1;
    score+=(e.tags||[]).filter(t=>tags.indexOf(t)>=0).length*2;
    return {e,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,5).map(x=>x.e);
  return (
    <>
    <div className="overlay" onClick={onClose}>
      <div className="modal detail" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div className="crumbs"><span style={{color:sysColor}}>{sys}</span>{Ico.chevR}<span style={{color}}>{entry.category}</span></div>
          <button className="x" onClick={onClose}>{Ico.x}</button>
        </div>
        <div className="modal-body">
          <h2 className="detail-title">{entry.title}</h2>
          <div className="detail-meta">
            <span className={"typechip "+(entryKind(entry)==="code"?"is-code":entryKind(entry)==="checklist"?"is-check":"is-note")}>{entryKind(entry)==="code"?Ico.code:entryKind(entry)==="checklist"?Ico.checklist:Ico.note}{entryKind(entry)==="code"?"kod":entryKind(entry)==="checklist"?"checklista":"text"}</span>
            {entry.shared
              ? <span className="sharechip shared">{Ico.users}{mine?"delad med teamet":"delad av "+(entry.author||"team")}</span>
              : <span className="sharechip priv">{Ico.lock}privat</span>}
            <span className="detail-date">{Ico.clock} uppdaterad {fmtDate(entry.updated_at)}</span>
            {entry.station&&entry.station.trim()&&<span className="station-pill">{Ico.pin}{entry.station}</span>}
          </div>
          {tags.length>0&&<div className="tags">{tags.map(t=><button key={t} className="tag" onClick={()=>onTag&&onTag(t)}>#{t}</button>)}</div>}
          {entry.checklist && entry.checklist.length ? (
            <>
              {entry.notes && entry.notes.trim() && <p className="note desc" style={{padding:"2px 0"}}>{entry.notes}</p>}
              <Checklist entry={entry} interactive={true} />
            </>
          ) : blocks ? (
            <>
              {entry.notes && entry.notes.trim() && <p className="note desc" style={{padding:"2px 0"}}>{entry.notes}</p>}
              {tplVars.length>0 && (
                <div className="tplfill">
                  <div className="related-h">{Ico.code} Fyll i mall</div>
                  <div className="tplfields">
                    {tplVars.map(v=>(
                      <label key={v} className="tplfield"><span>{v}</span>
                        <input value={vals[v]||""} onChange={e=>setVals(x=>({...x,[v]:e.target.value}))} placeholder={"{{"+v+"}}"} /></label>
                    ))}
                  </div>
                </div>
              )}
              {blocks.map((b,i)=>(
                <div className="code-wrap" key={i}>
                  <div className="code-bar"><span className="cdots"><i></i><i></i><i></i></span><span className="code-lbl">{b.title||(b.lang&&b.lang!=="auto"?b.lang:"kod")}</span>
                    <button className="code-copy" onClick={()=>copyBlock(fill(b.code),i)}>{copiedIdx===i?<>{Ico.check} kopierat</>:<>{Ico.copy} kopiera</>}</button></div>
                  <CodeBlock code={fill(b.code)} lang={b.lang} />
                </div>
              ))}
            </>
          ) : <p className="note" style={{padding:"6px 0"}}>{entry.content}</p>}
          {entry.images && entry.images.length>0 && (
            <div className="detail-imgs">
              {entry.images.map(url=>(
                <a key={url} href={url} target="_blank" rel="noopener noreferrer"><img src={url} alt="" loading="lazy" /></a>
              ))}
            </div>
          )}
          {entry.files && entry.files.length>0 && (
            <div className="filelist detail-files">
              {entry.files.map(f=>(
                <a key={f.url} className="fileitem dl" href={f.url} target="_blank" rel="noopener noreferrer" download={f.name}>
                  <span className="file-ic">{Ico.file}</span>
                  <span className="file-name" title={f.name}>{f.name}</span>
                  <span className="file-size">{fmtSize(f.size)}</span>
                  <span className="file-dl">{Ico.down}</span>
                </a>
              ))}
            </div>
          )}
          {hist!==null && (
            <div className="histbox">
              <div className="related-h">{Ico.undo} Versionshistorik</div>
              {histBusy ? <div className="hist-empty">Laddar…</div>
               : hist.length===0 ? <div className="hist-empty">Inga tidigare versioner än. Nästa gång du sparar en ändring hamnar den föregående versionen här.</div>
               : hist.map(v=>(
                  <div key={v.id} className="histrow">
                    <div style={{minWidth:0,flex:1}}>
                      <div className="hist-when">{Ico.clock} {fmtDateTime(v.created_at)}</div>
                      <div className="hist-snip">{((v.snapshot&&v.snapshot.content)||"").replace(/\s+/g," ").slice(0,70)||"(tom)"}</div>
                    </div>
                    <button className="hist-restore" disabled={restoring} onClick={()=>doRestore(v)}>{Ico.undo} Återställ</button>
                  </div>
                 ))}
            </div>
          )}
          {related.length>0 && <div className="related">
            <div className="related-h">{Ico.link} Relaterade poster</div>
            {related.map(r=><MiniRow key={r.id} entry={r} onClick={()=>onOpen(r)} />)}
          </div>}

          <div className="comments">
            <div className="related-h">{Ico.chat} Kommentarer{comments&&comments.length>0?" ("+comments.length+")":""}</div>
            {comments===null ? <div className="cmt-empty">Laddar…</div>
             : comments.length===0 ? <div className="cmt-empty">Inga kommentarer än. Skriv den första – bra för att förtydliga eller komplettera.</div>
             : comments.map(c=>{
                const canDel = c.user_id===uid || mine;
                return <div key={c.id} className="cmt">
                  <div className="cmt-head">
                    <span className="cmt-av">{(c.author_name||"?").slice(0,2).toUpperCase()}</span>
                    <span className="cmt-name">{c.author_name||"medlem"}</span>
                    <span className="cmt-time">{fmtDateTime(c.created_at)}</span>
                    {canDel && <button className="cmt-del" title="Ta bort" onClick={()=>removeComment(c.id)}>{Ico.x}</button>}
                  </div>
                  <div className="cmt-body">{c.body}</div>
                </div>;
               })}
            <div className="cmt-input">
              <textarea value={ctext} onChange={e=>setCtext(e.target.value)} rows={2} placeholder="Skriv en kommentar…"
                onKeyDown={e=>{ if(e.key==="Enter"&&(e.metaKey||e.ctrlKey)){ e.preventDefault(); postComment(); } }} />
              <button className="foot-btn foot-save" disabled={csending||!ctext.trim()} onClick={postComment}>{Ico.send} Kommentera</button>
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <div className="foot-tools">
            <button className={"foot-mini"+(fav?" on":"")} onClick={onFav} title={fav?"Ta bort favorit":"Lägg till favorit"}>{Ico.star} {fav?"Favorit ✓":"Favorit"}</button>
            <button className="foot-mini" onClick={()=>setShowQR(true)} title="QR-kod">{Ico.qr} QR</button>
            <button className="foot-mini" onClick={()=>exportEntriesPDF([entry], entry.title)} title="Exportera PDF">{Ico.report} PDF</button>
            <button className={"foot-mini"+(offlineSaved?" on":"")} onClick={onToggleOffline} title={offlineSaved?"Sparad offline":"Ta med offline"}>{Ico.down} {offlineSaved?"Offline ✓":"Offline"}</button>
            {mine && <button className="foot-mini" onClick={()=>hist===null?openHist():setHist(null)}>{Ico.undo} {hist===null?"Historik":"Dölj"}</button>}
          </div>
          <div className="foot-main">
            <button className="foot-btn foot-cancel" onClick={onClose}>Stäng</button>
            {mine && <button className="foot-btn foot-save" onClick={()=>onEdit(entry)}>{Ico.edit} Redigera</button>}
          </div>
        </div>
      </div>
    </div>
    {showQR && <QRModal entry={entry} onClose={()=>setShowQR(false)} />}
    </>
  );
}
