function ChatView({token, uid, name, user, display, unreadMap={}, onSeen}){
  const [members,setMembers]=useState([]);
  const [conv,setConv]=useState("team");
  const [msgs,setMsgs]=useState([]);
  const [text,setText]=useState("");
  const [loading,setLoading]=useState(true);
  const [sending,setSending]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{ listMembers(token).then(ms=>setMembers((ms||[]).filter(m=>m.id!==uid))); },[]);
  useEffect(()=>{
    let stop=false; setLoading(true);
    async function tick(){ try{ const m=await fetchMessages(token, uid, conv); if(!stop){ setMsgs(m); if(onSeen) onSeen(conv); } }catch(e){} if(!stop) setLoading(false); }
    tick();
    const iv=setInterval(tick, 4000);
    return ()=>{ stop=true; clearInterval(iv); };
  },[conv, token, uid]);
  useEffect(()=>{ if(endRef.current) endRef.current.scrollIntoView(); },[msgs.length]);
  function memberLabel(m){ return ((m&&m.email)||"").split("@")[0] || "medlem"; }
  const convLabel = conv==="team" ? "Teamet" : (function(){ const m=members.find(x=>x.id===conv); return m?memberLabel(m):"medlem"; })();
  async function send(){
    const b=text.trim(); if(!b||sending) return;
    setSending(true);
    const row={ sender_id:uid, sender_name:(name||display||user), recipient_id: conv==="team"?null:conv, body:b };
    try{ const m=await sendMessageRow(token,row); setMsgs(x=>[...x,m]); setText(""); }catch(e){ alert(e.message); }
    setSending(false);
  }
  return (
    <div className="chat">
      <div className="page-head"><div><h2 className="page-title">Chatt</h2><p className="page-sub">{conv==="team"?"Hela teamet":"Privat med "+convLabel}</p></div></div>
      <div className="chat-people">
        <button className={"person"+(conv==="team"?" active":"")} onClick={()=>setConv("team")}><span className="person-ic">{Ico.users}</span>Teamet{conv!=="team"&&unreadMap.team>0&&<span className="person-dot"></span>}</button>
        {members.map(m=>(
          <button key={m.id} className={"person"+(conv===m.id?" active":"")} onClick={()=>setConv(m.id)}>
            <span className="person-av">{memberLabel(m).slice(0,2).toUpperCase()}</span>{memberLabel(m)}{conv!==m.id&&unreadMap[m.id]>0&&<span className="person-dot"></span>}
          </button>
        ))}
        {members.length===0 && <span className="chat-hint">Inga andra medlemmar än</span>}
      </div>
      <div className="chat-msgs">
        {loading && msgs.length===0 ? <div className="chat-empty">Laddar…</div>
         : msgs.length===0 ? <div className="chat-empty">{conv==="team"?"Inga meddelanden i teamet än – skriv det första!":"Inga meddelanden än – säg hej!"}</div>
         : msgs.map(m=>{
            const mine=m.sender_id===uid;
            return <div key={m.id} className={"bubble-row"+(mine?" me":"")}>
              <div className={"bubble"+(mine?" me":"")}>
                {!mine && <div className="bubble-name">{m.sender_name||"medlem"}</div>}
                <div className="bubble-body">{m.body}</div>
                <div className="bubble-time">{fmtTime(m.created_at)}</div>
              </div>
            </div>;
           })}
        <div ref={endRef}></div>
      </div>
      <div className="chat-input">
        <textarea value={text} onChange={e=>setText(e.target.value)} rows={1} placeholder={"Skriv till "+convLabel+"…"}
          onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); } }} />
        <button className="chat-send" disabled={sending||!text.trim()} onClick={send} title="Skicka">{Ico.send}</button>
      </div>
    </div>
  );
}

function Chip({label,active,color,count,onClick}){
  return (<button className={"chip"+(active?" active":"")} style={{borderColor:active?color:"var(--line)"}} onClick={onClick}>
    <span className="cdot" style={{background:color}}></span>{label}{count>0&&<span className="cnt">{count}</span>}</button>);
}

function fmtDate(iso){ if(!iso) return ""; try{ return new Date(iso).toLocaleDateString("sv-SE",{year:"numeric",month:"short",day:"numeric"}); }catch(e){ return ""; } }
function fmtDateTime(iso){ if(!iso) return ""; try{ return new Date(iso).toLocaleString("sv-SE",{dateStyle:"medium",timeStyle:"short"}); }catch(e){ return ""; } }
function fmtTime(iso){ if(!iso) return ""; try{ return new Date(iso).toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } }
function CodeBlock({code,lang}){
  let html=null;
  try{
    if(window.hljs){
      if(lang && lang!=="auto" && window.hljs.getLanguage(lang)) html=window.hljs.highlight(code,{language:lang,ignoreIllegals:true}).value;
      else html=window.hljs.highlightAuto(code,["python","sql","json","javascript","bash","xml"]).value;
    }
  }catch(e){}
  const lineCount=(code||"").split("\n").length;
  const gutter=Array.from({length:lineCount},(_,i)=>i+1).join("\n");
  return (
    <pre className="code"><span className="gutter" aria-hidden="true">{gutter}</span>
      {html!=null
        ? <code className="hljs codebody" dangerouslySetInnerHTML={{__html:html}} />
        : <code className="codebody">{code}</code>}
    </pre>
  );
}

function EntryCard({entry,mine=true,copied,onCopy,onEdit,onDelete,onPin,onTag,onOpen}){
  const [confirm,setConfirm]=useState(false);
  const [exp,setExp]=useState(false);
  const color=CAT_COLOR[entry.category]||"#94a3b8";
  const sys=entry.system||"Ignition";
  const sysColor=SYS_COLOR[sys]||"#94a3b8";
  const tags=entry.tags||[];
  const lines=(entry.content||"").split("\n");
  const long=lines.length>16;
  const shown=exp||!long?entry.content:lines.slice(0,16).join("\n");
  const codeText=shown+(!exp&&long?"\n…":"");
  return (
    <div className={"card"+(entry.pinned?" pinned":"")} style={{"--cat":color}}>
      <div className="card-head">
        <span className="card-dot" style={{background:color}}></span>
        <div style={{minWidth:0,flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <button className="card-title" onClick={()=>onOpen&&onOpen(entry)}>{entry.title}</button>
            <span className="systag" style={{color:sysColor,borderColor:sysColor+"55"}}>{sys}</span>
            <span className="badge" style={{background:color+"22",color}}>{entry.category}</span>
            <span className={"typechip "+(entry.is_code?"is-code":"is-note")}>{entry.is_code?Ico.code:Ico.note}{entry.is_code?"kod":"text"}</span>
            {entry.shared
              ? <span className="sharechip shared">{Ico.users}{mine?"delad":"av "+(entry.author||"team")}</span>
              : <span className="sharechip priv">{Ico.lock}privat</span>}
          </div>
          {tags.length>0&&<div className="tags">{tags.map(t=><button key={t} className="tag" onClick={()=>onTag&&onTag(t)}>#{t}</button>)}</div>}
        </div>
        <div className="card-actions">
          {mine && <button className={"ibtn"+(entry.pinned?" on":"")} onClick={onPin} title={entry.pinned?"Ta bort favorit":"Favoritmarkera"}>{Ico.star}</button>}
          <button className="ibtn" onClick={onCopy} title="Kopiera">{copied?<span style={{color:"var(--ok)"}}>{Ico.check}</span>:Ico.copy}</button>
          {mine && <button className="ibtn" onClick={onEdit} title="Redigera">{Ico.edit}</button>}
          {mine && <button className="ibtn" onClick={()=>setConfirm(true)} title="Ta bort">{Ico.trash}</button>}
        </div>
      </div>
      {entry.is_code ? (
        <>
          {entry.notes && entry.notes.trim() && <p className="note desc">{entry.notes}</p>}
          <div className="code-wrap">
            <div className="code-bar"><span className="cdots"><i></i><i></i><i></i></span><span className="code-lbl">{entry.lang&&entry.lang!=="auto"?entry.lang:"kod"}</span>
              <button className="code-copy" onClick={onCopy} title="Kopiera kod">{copied?<>{Ico.check} kopierat</>:<>{Ico.copy} kopiera</>}</button></div>
            <CodeBlock code={codeText} lang={entry.lang} />
          </div>
        </>
      ) : <p className="note">{shown}{!exp&&long?" …":""}</p>}
      {entry.images && entry.images.length>0 && (
        <div className="imgstrip">
          {entry.images.slice(0,4).map((url,i)=>(
            <a key={url} href={url} target="_blank" rel="noopener noreferrer" className="imgthumb" onClick={e=>e.stopPropagation()}>
              <img src={url} alt="" loading="lazy" />
              {i===3 && entry.images.length>4 && <span className="imgmore">+{entry.images.length-4}</span>}
            </a>
          ))}
        </div>
      )}
      {long && <button className="more" onClick={()=>setExp(!exp)}>{exp?<>{Ico.chevU} Visa mindre</>:<>{Ico.chevD} Visa mer</>}</button>}
      <div className="card-foot">{Ico.clock}<span>uppdaterad {fmtDate(entry.updated_at)}</span></div>
      {confirm && (<div className="confirm"><span className="msg">{Ico.alert} Ta bort permanent?</span>
        <div style={{display:"flex",gap:8}}><button className="btn-cancel" onClick={()=>setConfirm(false)}>Avbryt</button>
        <button className="btn-del" onClick={onDelete}>Ta bort</button></div></div>)}
    </div>
  );
}

function EntryForm({initial,busy,token,uid,onSave,onClose}){
  const [title,setTitle]=useState(initial.title||"");
  const [system,setSystem]=useState(initial.system||"Ignition");
  const [category,setCategory]=useState(initial.category||"Scripting");
  const [tags,setTags]=useState((initial.tags||[]).join(", "));
  const startCode=initial.is_code!==undefined?initial.is_code:true;
  const [isCode,setIsCode]=useState(startCode);
  const [code,setCode]=useState(startCode?(initial.content||""):"");
  const [text,setText]=useState(!startCode?(initial.content||""):"");
  const [desc,setDesc]=useState(initial.notes||"");
  const [shared,setShared]=useState(!!initial.shared);
  const [lang,setLang]=useState(initial.lang||"auto");
  const [images,setImages]=useState(initial.images||[]);
  const [upBusy,setUpBusy]=useState(false); const [upErr,setUpErr]=useState("");
  const fileRef=useRef(null);
  const body=isCode?code:text;
  const valid=title.trim()&&body.trim();
  async function addImages(e){
    const files=Array.prototype.slice.call(e.target.files||[]); e.target.value="";
    if(!files.length) return;
    setUpBusy(true); setUpErr("");
    try{ for(const f of files){ const url=await uploadImage(token, uid, f); setImages(im=>[...im, url]); } }
    catch(err){ setUpErr(err.message||"Kunde inte ladda upp"); }
    setUpBusy(false);
  }
  function removeImage(url){ setImages(im=>im.filter(u=>u!==url)); }
  function handleSave(){ if(!valid)return; onSave({id:initial.id,title:title.trim(),system,category,tags:tags.split(",").map(t=>t.trim()).filter(Boolean),content:isCode?code:text,notes:isCode?desc:"",isCode,shared,images,lang:isCode?lang:"auto"}); }
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h2>{initial.id?"Redigera post":"Ny post"}</h2><button className="x" onClick={onClose}>{Ico.x}</button></div>
        <div className="modal-body">
          <label className="field"><span className="lbl">Titel</span>
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="t.ex. Läsa UDT-parameter med getConfiguration" /></label>
          <div className="row2">
            <label className="field"><span className="lbl">System</span>
              <select value={system} onChange={e=>setSystem(e.target.value)}>{SYSTEMS.map(s=><option key={s} value={s}>{s}</option>)}</select></label>
            <label className="field"><span className="lbl">Ämne</span>
              <select value={category} onChange={e=>setCategory(e.target.value)}>{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select></label>
          </div>
          <label className="field"><span className="lbl">Taggar (komma)</span>
            <input value={tags} onChange={e=>setTags(e.target.value)} placeholder="udt, perspective" /></label>
          <div className="toggle-row share-toggle">
            <button className={"toggle"+(!shared?" active":"")} onClick={()=>setShared(false)}>{Ico.lock} Privat</button>
            <button className={"toggle"+(shared?" active":"")} onClick={()=>setShared(true)}>{Ico.users} Delad med teamet</button>
          </div>
          <div className="share-hint">{shared?"Alla godkända i teamet kan se den här posten (bara du kan ändra den).":"Bara du ser den här posten."}</div>
          <div className="toggle-row">
            <button className={"toggle"+(isCode?" active":"")} onClick={()=>setIsCode(true)}>{Ico.code} Kod</button>
            <button className={"toggle"+(!isCode?" active":"")} onClick={()=>setIsCode(false)}>{Ico.note} Anteckning</button>
          </div>
          {isCode ? (
            <div className="splitfields">
              <label className="field"><span className="lbl" style={{display:"flex",alignItems:"center",gap:8}}>{Ico.code} Kod / script
                <select className="langsel" value={lang} onChange={e=>setLang(e.target.value)}>
                  <option value="auto">auto</option><option value="python">Python</option><option value="sql">SQL</option>
                  <option value="json">JSON</option><option value="javascript">JavaScript</option><option value="bash">Bash</option><option value="xml">XML/HTML</option>
                </select></span>
                <textarea value={code} onChange={e=>setCode(e.target.value)} rows={10} placeholder="Klistra in din kod här…" style={{fontFamily:"var(--mono)"}} /></label>
              <label className="field"><span className="lbl">{Ico.note} Beskrivning / anteckning <span className="lbl-opt">valfritt</span></span>
                <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={10} placeholder="Beskriv vad koden gör, fallgropar, var den används…" style={{fontFamily:"var(--sans)"}} /></label>
            </div>
          ) : (
            <label className="field"><span className="lbl">{Ico.note} Text</span>
              <textarea value={text} onChange={e=>setText(e.target.value)} rows={8} placeholder="Skriv din anteckning här…" style={{fontFamily:"var(--sans)"}} /></label>
          )}
          <div className="imgsection">
            <div className="lbl" style={{marginBottom:8}}>{Ico.image} Bilder / skärmdumpar <span className="lbl-opt">valfritt</span></div>
            <div className="imggrid">
              {images.map(url=>(
                <div key={url} className="imgitem">
                  <img src={url} alt="" />
                  <button className="imgdel" onClick={()=>removeImage(url)} title="Ta bort">{Ico.x}</button>
                </div>
              ))}
              <button className="imgadd" onClick={()=>fileRef.current&&fileRef.current.click()} disabled={upBusy}>
                {upBusy?<span className="spin" style={{display:"inline-block"}}>{Ico.image}</span>:Ico.add}
                <span>{upBusy?"Laddar upp…":"Lägg till"}</span>
              </button>
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple onChange={addImages} style={{display:"none"}} />
            {upErr && <div style={{color:"#fca5a5",fontSize:12,marginTop:6}}>{upErr}</div>}
          </div>
        </div>
        <div className="modal-foot">
          <button className="foot-btn foot-cancel" onClick={onClose}>Avbryt</button>
          <button className="foot-btn foot-save" disabled={!valid||busy} onClick={handleSave}>{Ico.save} {busy?"Sparar…":"Spara"}</button>
        </div>
      </div>
    </div>
  );
}

function UserModal({token,user,name,isAdmin,onName,onClose}){
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState(null); const [need,setNeed]=useState(false);
  const [profiles,setProfiles]=useState(null); const [pBusy,setPBusy]=useState(false);
  useEffect(()=>{ if(isAdmin) loadProfiles(); },[]);
  async function loadProfiles(){ setPBusy(true); try{ setProfiles(await listProfiles(token)); }catch(e){ setProfiles([]); } setPBusy(false); }
  async function approve(id,val){ try{ await setApproved(token,id,val); setProfiles(ps=>(ps||[]).map(p=>p.id===id?{...p,approved:val}:p)); }catch(e){} }
  async function create(){
    if(!email||!pw) return;
    setBusy(true); setMsg(null); setNeed(false);
    try{
      await createUserViaFunction(token,email.trim(),pw);
      setMsg({ok:true,text:"Användare skapad: "+email.trim()});
      setEmail(""); setPw("");
    }catch(e){
      if(e.message==="__NO_FUNCTION__"){ setNeed(true); }
      else setMsg({ok:false,text:e.message});
    }
    setBusy(false);
  }
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h2>Konto &amp; användare</h2><button className="x" onClick={onClose}>{Ico.x}</button></div>
        <div className="modal-body">
          <div className="useryou">{Ico.users}<div><div style={{color:"var(--txt)",fontSize:13}}>{(name&&name.trim())||user}</div><div style={{color:"var(--dim)",fontSize:11}}>{user}</div></div></div>
          {isAdmin ? (
            <>
              <div className="udivider">Användare &amp; godkännande</div>
              {pBusy && <div style={{color:"var(--dim)",fontSize:12}}>Laddar…</div>}
              {profiles && profiles.length===0 && !pBusy && <div style={{color:"var(--dim)",fontSize:12}}>Inga användare än.</div>}
              {profiles && profiles.map(p=>(
                <div key={p.id} className="urow">
                  <div style={{minWidth:0,flex:1}}>
                    <div className="urow-mail">{p.email||p.id}{p.is_admin&&<span className="utag admin">admin</span>}</div>
                    <div className={"urow-status "+(p.approved?"ok":"wait")}>{p.approved?"godkänd":"väntar"}</div>
                  </div>
                  {!p.is_admin && (p.approved
                    ? <button className="ubtn-revoke" onClick={()=>approve(p.id,false)}>Återkalla</button>
                    : <button className="ubtn-approve" onClick={()=>approve(p.id,true)}>{Ico.check} Godkänn</button>)}
                </div>
              ))}
              <p style={{color:"var(--dim)",fontSize:11,margin:0,lineHeight:1.5}}>Nya kollegor registrerar sig själva på inloggningssidan. De kommer in först när du godkänt dem här. Varje användare ser bara sina egna poster.</p>
            </>
          ) : (
            <p style={{color:"var(--dim)",fontSize:12,margin:0,lineHeight:1.5}}>Dina poster är privata. Nya kollegor kan registrera sig själva på inloggningssidan — en administratör godkänner dem.</p>
          )}
        </div>
      </div>
    </div>
  );
}
