{title:"Läsa UDT-parameter (ENGMAX/ENGMIN/UNIT)",category:"Scripting",tags:["udt","getConfiguration","perspective"],is_code:true,content:`# system.tag.browse returnerar INTE parametervärden – använd getConfiguration.
# Parametrar nås med .value (dot-access), inte ["value"] eller .get("value").
# tagPath MÅSTE ha provider-prefix: [Vatten05]HST/VVV/TOR/PLC1/NG1/NG1

def transform(self, value, event):
    import system
    tagPath = value
    if not tagPath: return None
    isUdt = False
    try:
        parentPath = "/".join(tagPath.split("/")[:-1])
        tagName    = tagPath.split("/")[-1]
        for r in system.tag.browse(parentPath, {"tagType":"UdtInstance"}).getResults():
            if str(r.get("name")) == tagName: isUdt = True; break
    except: pass
    try:
        if isUdt:
            params = system.tag.getConfiguration(tagPath, False)[0].get("parameters", {})
            engmax = params.get("ENGMAX", None)
            return engmax.value if engmax else None     # .value, inte .get!
        qv = system.tag.readBlocking([tagPath + ".engHigh"])[0]
        return qv.value if qv.quality.isGood() else None
    except Exception as e:
        system.perspective.print("[engHigh] " + str(e)); return None`},

# Bygg tagPath i headern: split(":/tag:")[1].split(":/alm:")[0], spara på custom.

def runAction(self, event):
    import time
    PULSE = ["LARM_M_KVITT","LARM_M_RESET","LARM_M_RST"]; DELAY = 3
    eventId = self.view.params.eventId; tagPath = self.view.params.tagPath
    if not eventId or not tagPath: return
    user = self.session.props.auth.user.userName
    system.alarm.acknowledge([eventId], "", user)
    folder = '/'.join(tagPath.split('/')[:-1])
    tags = [t for t in ["%s/%s"%(folder,s) for s in PULSE] if system.tag.exists(t)]
    if tags:
        system.tag.writeBlocking(tags, [True]*len(tags))
        time.sleep(DELAY)

/* ─── Auth + REST helpers ─── */
const authBase = SUPABASE_URL + "/auth/v1";
const restBase = SUPABASE_URL + "/rest/v1/entries";
async function signIn(email, password){
  const r = await fetch(authBase + "/token?grant_type=password", {
    method:"POST", headers:{apikey:SUPABASE_KEY,"Content-Type":"application/json"},
    body: JSON.stringify({email, password})
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error_description || d.msg || "Inloggning misslyckades");
  return d; // access_token, user...
}
function dataHeaders(token){
  return { apikey: SUPABASE_KEY, Authorization: "Bearer " + token, "Content-Type":"application/json" };
}
async function apiGet(token){
  const r = await fetch(restBase + "?select=*&order=updated_at.desc", {headers: dataHeaders(token)});
  if (!r.ok) throw new Error("GET " + r.status); return r.json();
}
async function apiInsert(token, rows){
  const r = await fetch(restBase, {method:"POST", headers:{...dataHeaders(token), Prefer:"return=representation"}, body: JSON.stringify(rows)});
  if (!r.ok) throw new Error("INSERT " + r.status); return r.json();
}
async function apiUpdate(token, id, row){
  const r = await fetch(restBase + "?id=eq." + id, {method:"PATCH", headers:{...dataHeaders(token), Prefer:"return=representation"}, body: JSON.stringify(row)});
  if (!r.ok) throw new Error("UPDATE " + r.status); return (await r.json())[0];
}
async function apiDelete(token, id){
  const r = await fetch(restBase + "?id=eq." + id, {method:"DELETE", headers: dataHeaders(token)});
  if (!r.ok) throw new Error("DELETE " + r.status);
}

  copy:<I size={15} d={<><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>} />,
  check:<I size={15} d={<path d="M20 6 9 17l-5-5"/>} />,
  edit:<I size={15} d={<><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></>} />,
  trash:<I size={15} d={<><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>} />,
  x:<I size={20} d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />,
  save:<I size={16} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></>} />,
  code:<I size={14} d={<><path d="m16 18 6-6-6-6"/><path d="m8 6-6 6 6 6"/></>} />,
  file:<I size={14} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></>} />,
  down:<I size={16} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></>} />,
  up:<I size={16} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></>} />,
  out:<I size={16} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></>} />,
  chevD:<I size={13} d={<path d="m6 9 6 6 6-6"/>} />,
  chevU:<I size={13} d={<path d="m18 15-6-6-6 6"/>} />,
  alert:<I size={14} d={<><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></>} />,
};

function App(){
  const configured = !SUPABASE_URL.includes("DITT-PROJEKT") && !SUPABASE_KEY.includes("DIN-ANON");
  const [token, setToken] = useState(null);
  const [user, setUser] = useState("");

  if (!configured) return (<div className="wrap"><div className="banner err" style={{marginTop:40}}>Inte konfigurerad. Öppna filen i en texteditor och fyll i <b>SUPABASE_URL</b> och <b>SUPABASE_KEY</b> högst upp (rad ~12).</div></div>);
  if (!token) return <Login onLogin={(t,u)=>{setToken(t); setUser(u);}} />;
  return <KB token={token} user={user} onLogout={()=>{setToken(null); setUser("");}} />;
}

function Login({onLogin}){
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);
  async function submit(){
    if(!email||!pw) return;
    setBusy(true); setErr("");
    try{ const d = await signIn(email.trim(), pw); onLogin(d.access_token, (d.user&&d.user.email)||email); }
    catch(e){ setErr(e.message); }
    setBusy(false);
  }
  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">{Ico.db}</div>
        <h1 style={{fontFamily:"var(--mono)"}}>SCADA·KB</h1>
        <p>Logga in för att nå teamets kunskapsbas.</p>
        {err && <div className="banner err" style={{marginTop:0}}>{err}</div>}
        <label><span className="lbl">E-post</span>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="namn@kommun.se" onKeyDown={e=>e.key==='Enter'&&submit()} /></label>
        <label><span className="lbl">Lösenord</span>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} /></label>
        <button className="btn-amber" style={{width:"100%",marginTop:8,padding:"11px"}} disabled={busy||!email||!pw} onClick={submit}>
          {busy?"Loggar in…":"Logga in"}
        </button>
        <p style={{marginTop:16,marginBottom:0,fontSize:12}}>Konton skapas av admin i Supabase → Authentication → Users.</p>
      </div>
    </div>
  );
}

function KB({token, user, onLogout}){
  const [entries,setEntries]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [busy,setBusy]=useState(false);
  const [search,setSearch]=useState("");
  const [activeCat,setActiveCat]=useState("Alla");
  const [editing,setEditing]=useState(null);
  const [copiedId,setCopiedId]=useState(null);
  const [toast,setToast]=useState("");
  const fileRef=useRef(null);

  useEffect(()=>{ load(); },[]);
  function flash(m){ setToast(m); setTimeout(()=>setToast(""),2400); }

  async function load(){
    setLoading(true); setError(null);
    try{ setEntries(await apiGet(token)); }
    catch(e){ setError("Kunde inte hämta data. Sessionen kan ha gått ut – logga in igen."); }
    setLoading(false);
  }
  async function saveEntry(data){
    setBusy(true);
    const row={title:data.title,category:data.category,tags:data.tags,content:data.content,is_code:data.isCode,updated_at:new Date().toISOString()};
    try{
      if(data.id){ const u=await apiUpdate(token,data.id,row); setEntries(entries.map(e=>e.id===data.id?u:e)); }
      else{ const n=await apiInsert(token,[row]); setEntries([...n, ...entries]); }
      setEditing(null);
    }catch(e){ alert("Kunde inte spara: "+e.message); }
    setBusy(false);
  }
  async function deleteEntry(id){
    try{ await apiDelete(token,id); setEntries(entries.filter(e=>e.id!==id)); }
    catch(e){ alert("Kunde inte ta bort: "+e.message); }
  }
  async function loadExamples(){
    setBusy(true);
    try{
      const rows=SEED.map(s=>({...s, updated_at:new Date().toISOString()}));
      const inserted=await apiInsert(token,rows);
      setEntries([...inserted, ...entries]);
      flash("Laddade "+inserted.length+" exempelposter");
    }catch(e){ alert("Kunde inte ladda exempel: "+e.message); }
    setBusy(false);
  }
  function copyContent(e){ navigator.clipboard&&navigator.clipboard.writeText(e.content); setCopiedId(e.id); setTimeout(()=>setCopiedId(null),1500); }
  function exportData(){
    const blob=new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download="scada-kb-backup.json"; a.click(); URL.revokeObjectURL(url);
    flash("Exporterade "+entries.length+" poster");
  }
  function importData(ev){
    const file=ev.target.files&&ev.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=async(e)=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!Array.isArray(data)) throw new Error();
        const rows=data.filter(d=>d&&d.title).map(d=>({title:d.title,category:d.category||"Övrigt",tags:d.tags||[],content:d.content||"",is_code:d.is_code!==undefined?d.is_code:!!d.isCode,updated_at:new Date().toISOString()}));
        setBusy(true);
        const inserted=await apiInsert(token,rows);
        setEntries([...inserted, ...entries]);
        flash("Importerade "+inserted.length+" poster");
      }catch(err){ flash("Kunde inte läsa filen"); }
      setBusy(false);
    };
    reader.readAsText(file); ev.target.value="";
  }

  const filtered=useMemo(()=>{
    const q=search.trim().toLowerCase();
    return entries.filter(e=>{
      if(activeCat!=="Alla"&&e.category!==activeCat) return false;
      if(!q) return true;
      return (e.title+" "+e.content+" "+(e.tags||[]).join(" ")).toLowerCase().includes(q);
    });
  },[entries,search,activeCat]);
  const counts=useMemo(()=>{const c={}; entries.forEach(e=>c[e.category]=(c[e.category]||0)+1); return c;},[entries]);

  return (
    <div className="wrap">
      <header>
        <div className="head-row">
          <div className="logo" style={{color:"var(--accent)"}}>{Ico.db}</div>
          <div style={{minWidth:0}}>
            <h1>SCADA<span style={{color:"var(--accent)"}}>·</span>KB</h1>
            <p className="sub">Delad kunskapsbas — PLC &amp; SCADA</p>
          </div>
          <div className="hbtns">
            <button className="hbtn" title="Exportera (backup)" onClick={exportData}>{Ico.down}</button>
            <button className="hbtn" title="Importera" onClick={()=>fileRef.current.click()}>{Ico.up}</button>
            <button className="hbtn" title="Logga ut" onClick={onLogout}>{Ico.out}</button>
            <input ref={fileRef} type="file" accept="application/json" onChange={importData} style={{display:"none"}} />
          </div>
        </div>
        <div className="meta">
          {busy ? <span style={{color:"var(--ok)"}}>arbetar…</span>
                : <span style={{display:"flex",alignItems:"center",gap:6}}><span className="dot" style={{background:error?"var(--danger)":"var(--ok)"}}></span>{entries.length} poster</span>}
          <span>· inloggad: {user}</span>
        </div>
      </header>

      {error && <div className="banner err">{error}</div>}

      <div className="search-box">{Ico.search}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Sök i titel, kod, taggar…" /></div>

      <div className="chips">
        <Chip label="Alla" active={activeCat==="Alla"} color="#f59e0b" count={entries.length} onClick={()=>setActiveCat("Alla")} />
        {CATEGORIES.map(c=><Chip key={c} label={c} active={activeCat===c} color={CAT_COLOR[c]} count={counts[c]||0} onClick={()=>setActiveCat(c)} />)}
      </div>

      {loading ? (
        <div className="empty"><div className="spin" style={{display:"inline-block"}}>{Ico.db}</div><div>Laddar…</div></div>
      ) : filtered.length===0 ? (
        <div className="empty">
          <div className="empty-icon">{Ico.file}</div>
          <div>{entries.length>0?"Inga träffar för din sökning.":"Tom kunskapsbas. Ladda in exemplen vi gått igenom, eller skapa en egen post."}</div>
          {entries.length===0 && <div style={{marginTop:16,display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
            <button className="btn-amber" onClick={loadExamples}>{Ico.down} Ladda exempelposter</button>
            <button className="btn-amber" style={{background:"var(--line2)",color:"#cbd5e1"}} onClick={()=>setEditing({})}>{Ico.plus} Ny post</button>
          </div>}
        </div>
      ) : (
        filtered.map(e=><EntryCard key={e.id} entry={e} copied={copiedId===e.id} onCopy={()=>copyContent(e)} onEdit={()=>setEditing(e)} onDelete={()=>deleteEntry(e.id)} />)
      )}

      <button className="fab" onClick={()=>setEditing({})}>{Ico.plus}</button>
      {toast && <div className="toast">{toast}</div>}
      {editing!==null && <EntryForm initial={editing} busy={busy} onSave={saveEntry} onClose={()=>setEditing(null)} />}
    </div>
  );
}

function Chip({label,active,color,count,onClick}){
  return (<button className={"chip"+(active?" active":"")} style={{borderColor:active?color:"var(--line)"}} onClick={onClick}>
    <span className="cdot" style={{background:color}}></span>{label}{count>0&&<span className="cnt">{count}</span>}</button>);
}

function EntryCard({entry,copied,onCopy,onEdit,onDelete}){
  const [confirm,setConfirm]=useState(false);
  const [exp,setExp]=useState(false);
  const color=CAT_COLOR[entry.category]||"#94a3b8";
  const tags=entry.tags||[];
  const lines=(entry.content||"").split("\n");
  const long=lines.length>16;
  const shown=exp||!long?entry.content:lines.slice(0,16).join("\n");
  return (
    <div className="card">
      <div className="card-head">
        <span className="card-dot" style={{background:color}}></span>
        <div style={{minWidth:0,flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span className="card-title">{entry.title}</span>
            <span className="badge" style={{background:color+"22",color}}>{entry.category}</span>
          </div>
          {tags.length>0&&<div className="tags">{tags.map(t=><span key={t} className="tag">#{t}</span>)}</div>}
        </div>
        <div className="card-actions">
          <button className="ibtn" onClick={onCopy} title="Kopiera">{copied?<span style={{color:"var(--ok)"}}>{Ico.check}</span>:Ico.copy}</button>
          <button className="ibtn" onClick={onEdit} title="Redigera">{Ico.edit}</button>
          <button className="ibtn" onClick={()=>setConfirm(true)} title="Ta bort">{Ico.trash}</button>
        </div>
      </div>
      {entry.is_code ? <pre className="code">{shown}{!exp&&long?"\n…":""}</pre> : <p className="note">{shown}{!exp&&long?" …":""}</p>}
      {long && <button className="more" onClick={()=>setExp(!exp)}>{exp?<>{Ico.chevU} Visa mindre</>:<>{Ico.chevD} Visa mer</>}</button>}
      {confirm && (<div className="confirm"><span className="msg">{Ico.alert} Ta bort permanent?</span>
        <div style={{display:"flex",gap:8}}><button className="btn-cancel" onClick={()=>setConfirm(false)}>Avbryt</button>
        <button className="btn-del" onClick={onDelete}>Ta bort</button></div></div>)}
    </div>
  );
}

function EntryForm({initial,busy,onSave,onClose}){
  const [title,setTitle]=useState(initial.title||"");
  const [category,setCategory]=useState(initial.category||"Ignition");
  const [tags,setTags]=useState((initial.tags||[]).join(", "));
  const [content,setContent]=useState(initial.content||"");
  const [isCode,setIsCode]=useState(initial.is_code!==undefined?initial.is_code:true);
  const valid=title.trim()&&content.trim();
  function handleSave(){ if(!valid)return; onSave({id:initial.id,title:title.trim(),category,tags:tags.split(",").map(t=>t.trim()).filter(Boolean),content,isCode}); }
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h2>{initial.id?"Redigera post":"Ny post"}</h2><button className="x" onClick={onClose}>{Ico.x}</button></div>
        <div className="modal-body">
          <label className="field"><span className="lbl">Titel</span>
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="t.ex. Läsa UDT-parameter med getConfiguration" /></label>
          <div className="row2">
            <label className="field"><span className="lbl">Kategori</span>
              <select value={category} onChange={e=>setCategory(e.target.value)}>{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select></label>
            <label className="field"><span className="lbl">Taggar (komma)</span>
              <input value={tags} onChange={e=>setTags(e.target.value)} placeholder="udt, perspective" /></label>
          </div>
          <div className="toggle-row">
            <button className={"toggle"+(isCode?" active":"")} onClick={()=>setIsCode(true)}>{Ico.code} Kod</button>
            <button className={"toggle"+(!isCode?" active":"")} onClick={()=>setIsCode(false)}>{Ico.file} Anteckning</button>
          </div>
          <label className="field"><span className="lbl">{isCode?"Kod / script":"Text"}</span>
            <textarea value={content} onChange={e=>setContent(e.target.value)} rows={isCode?10:6} placeholder={isCode?"Klistra in din kod här…":"Skriv din anteckning här…"} style={{fontFamily:isCode?"var(--mono)":"var(--sans)"}} /></label>
        </div>
        <div className="modal-foot">
          <button className="foot-btn foot-cancel" onClick={onClose}>Avbryt</button>
          <button className="foot-btn foot-save" disabled={!valid||busy} onClick={handleSave}>{Ico.save} {busy?"Sparar…":"Spara"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
